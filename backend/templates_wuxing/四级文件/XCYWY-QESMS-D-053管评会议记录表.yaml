    sample_data:
    - - 主 持 人
      - 邵道鹏
      - 记 录 人
      - 高良
    - - '参加人员：

        各部门负责人及员工代表

        评审依据：

        1）GB/T 19001—2016 idt ISO 9001:2015 & GB/T 24001—2016 idt ISO 14001:2015 &
        GB/T 45001—2020 idt ISO 45001:2018标准

        2）GB/T 19001—2016 idt ISO 9001:2015 & GB/T 24001—2016 idt ISO 14001:2015 &
        GB/T 45001—2020 idt ISO 45001:2018一体化管理体系文件

        3）国家法律、法规、服务规范、合同等

        评审范围：

        1）质量环境职业健康安全管理体系建立、运行、保持和持续改进情况

        2）公司管理体系范围：物业管理服务。

        评审会议纪要：

        会议由总经理主持，各级管理人员参加会议。

        公司领导、各级管理人员针对评审的输入进行了发言。

        会议认为：

        1）公司的一体化方针、目标是充分的、适宜的、有效的，一体化方针已经被全体员工理解并贯彻，组织环境、风险和机遇已得到识别，一体化目标已分解并得到落实。

        2）审核和过程监视测量情况反映出一体化管理体系运行正常，未收到相关方投诉。

        3）一体化管理体系各过程符合标准、法律法规、相关方的要求

        4）质量、环境、安全运行控制和环境、安全绩效及监测情况基本满足要求

        5）环境因素、危险源的识别、评价、控制状况和法律法规的识别情况及公司对法律法规遵守情况基本按照标准的要求执行。

        6）纠正和纠正措施已经被经常使用，并取得一定效果。

        7）此次管理评审跟踪措施的实施情况由下次管评会议进行跟踪。

        8）目前尚未发生可能影响一体化管理体系变更的情况'
