document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-010节能降耗管理规定
  document_code: XCYWY-QESMS-C-010
  version: A/0
content:
  目的: 为创造节约型企业，降低能源消耗，减少环境影响，建立环境友好型企业。
  范围: 适用于对本公司经营及生活所需要的各种能源及办公耗材的节约使用。
  术语和定义: '能源

    指煤碳、石油、天然气、生物质能和电力、热力以及其他直接或者通过加工、转换而取得有用能的各种资源。

    降低消耗

    指通过技术进步、合理利用、科学管理和生产结构、设备结构、工艺合理化等途径，以最少的能源消耗取得最大的效益。

    降低消耗

    指通过人员自律、工艺优化、结构改进等措施减少经营、生活中所必须使用的能源消耗。

    节能降耗

    指加强用能管理，采取技术上可行、经济上合理以及环境和社会可以承受的措施，从能源到消费的各个环节，降低消耗、减少损失的污染物排放、制止浪费，有效、合理地利用能源。'
  要求: "职责\n4.1.1管理者代表\n4.1.1.1负责制定各部门及各种能源的消耗和节约指标和目标。\n4.1.2其他各部门\n4.1.2.1负责制定本部门内各岗位能源消耗及节约指标和目标。\n\
    4.1.2.2负责本部门节能降耗指标和目标的实施。\n节能降耗目标\n管理者代表要组织各部门按方针目标的规定，针对本部门以往能源消耗情况以及消耗和产出比，制定本部门能源消耗指标，能源消耗指标要与经营目标相结合。\n\
    节能降耗方案\n各部门要针对本部门能源使用及消耗情况策划节能降耗方案，节能降耗方案要量化，便于考核和实施。可行时，节能降耗方案要展开到每一个岗位、每一个工种、每一个操作过程。\n\
    节能降耗的规定\n4.4.1企业用能管理\n\t各部门要认真执行对设备的日常保养和维护工作，保持用能设备的良好技术状况，杜绝跑、冒、滴、漏现象，要加强用能设备的科学管理，开展运行情况、性能优化的监测工作，确保用能设备处在高效率、低消耗的状态下运行。要定期对设备进行技术评定，对老、旧、损及技术状况差、能耗高的设备，要制定停用、限用、报废等计划。\n\
    4.4.2节能技术管理\n4.4.2.1基本要求\n\t各部门要针对本部门的节能降耗目标，以及所消耗能源的特点，制定相应的节能技术规范文件。对于新、扩、改建的项目，均要采用节能的先进工艺、技术、材料和设备，并要明确节能的具体要求，工程项目的可行性研究和初步设计，要有合理利用能源的专题论证并列项审查。\n\
    4.4.2.2评价节能投资的基本原则\n\t对一般节能技术项目的投资，回收年限控制在三年以下，重大项目和以社会效益为主的项目，单独核定。对节能应用科研项目和资金投稿较高的技术改进、节能基建项目要进行技术、经济论证和可行性研究，并立项审批后方可实施。\n\
    能源供应管理\n各部门要配合能源供应部门做好能源的供应、管理和节约工作，结合节能目标，每年编制用能计划，并根据实际情况，逐步推定量和定额管理，可行时，可以采用定量包干的方式，促进节能工作的深入实施。\n\
    \t主管能源供就的部门，要根据本公司能源管理水平、能耗水平以及综合经济效益的高低，实行能源择优供应，对机关报投入的基建项目、新购进的用能设备要列入建设计划，申请用能量，列入上级批准文件与基建项目同时立项审批。\n\
    \t各公司要完善能源管理流程，做到能源有计量，运输有凭证，入库有验收，领发有登记，统计准确，定期盘存，并进行定期核销。\n能源使用过的统计\n各部门每月将能耗情况报所在公司，公司每季度要将该季度所使用的各种能源，包括水、电、气、油，原料等进行统计，编制《资源和能源消耗统计表》，报管理层，由管理层汇总统计，每年终评定节能降耗业绩。\n\
    奖惩\n每年依据节能降耗业绩评定，由公司对节能降耗先进单位和个人进行表彰或奖励，对节能降耗工作未认证贯彻实施或实施不力的单位和个人按公司相关的规定给予处罚，特别是对浪费能源或因工作失职导致能源无效消耗的单位和人员。"
