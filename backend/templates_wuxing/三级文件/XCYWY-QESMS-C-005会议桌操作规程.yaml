document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-005会议桌操作规程
  document_code: XCYWY-QESMS-C-005
  version: A/0
content:
  目的: 确保会议桌功能正常使用，满足会议需求，避免因操作不当导致设备损坏，延长使用寿命，提升会议效率。
  设备使用规范: '一、使用的前的准备

    1、确认会议桌供电电源符合设备要求，检查电源线连接牢固，确保地线接地良好，避免电源波动影响正常使用。

    2、检查会议桌表面是否干净整洁，确认桌面无明显污渍、水渍或异物残留，并擦拭干净。

    3、打开会议桌上的无线充电模块的开关，检查是否能正常为支持无线充电的电子设备供电。

    4、测试会议桌集成的多功能扩展接口（如USB接口、HDMI接口等），确保所有端口均能正常使用。

    5、检查会议桌的升降系统，确认升降按钮灵活，脚踏开关灵敏，检查升降过程中是否存在异常噪音或卡顿。

    6、确认会议桌配套的液晶显示屏（如有）接通电源后能正常启动，显示界面清晰无花屏。

    7、检查内置音响系统的音量调节功能，确保音质清晰，播放音源时无杂音或断续。

    8、将会议桌上放置的笔记本支架、文件夹、笔筒等配件整理归位，保持桌面秩序井然。

    9、熟悉紧急停止按钮的位置及使用方法，确保所有安全锁扣和防倾倒装置处于有效状态。

    10、根据实际需求提前调整好桌面倾斜角度和桌面高度，满足参会人员的舒适性需求。

    二、会议桌的使用步骤

    1、按下电源总开关，开启会议桌主控系统，等待系统自检完成并进入待机状态。

    2、通过触摸屏或遥控器激活会议桌智能会议模式，按照提示设置参与人数和设备联动方案。

    3、利用无线充电功能为参会者的手机或其他支持无线充电的设备充电，确认充电指示灯点亮。

    4、插入U盘或通过蓝牙连接笔记本电脑，验证会议桌的多媒体展示功能，确保音视频播放流畅。

    5、调节桌面高度至合适位置，同时调整桌面倾斜角度以适应书写或投影演示的需求。

    三、设备关闭步骤

    1、逐一关闭所有正在运行的设备，确保所有接入会议桌的外接设备已安全退出。

    2、依次关闭会议桌集成的功能模块，包括液晶屏幕、音响系统以及无线充电功能。

    3、按下电源总开关，切断会议桌主控系统的供电，等待设备完全停止运行后再离开。

    4、清理桌面杂物，保持桌面整洁，避免异物遗留导致下次使用不便。

    5、检查设备是否有异常情况，如有故障及时报修并记录相关信息。

    四、注意事项

    1、严禁在会议桌上放置超过承重限制的物品，以免损坏设备结构。

    2、禁止用尖锐物体刮擦桌面，防止桌面涂层受损影响美观及使用寿命。

    3、定期对升降系统进行维护保养，避免因长期使用造成机械部件磨损。

    4、使用完毕后及时整理桌面，避免长时间未清理导致灰尘堆积。

    5、若需长时间不使用，建议关闭电源并拔掉插头，减少能耗并延长设备寿命。'
