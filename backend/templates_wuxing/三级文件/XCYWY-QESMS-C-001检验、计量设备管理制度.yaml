document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-001检验、计量设备管理制度
  document_code: XCYWY-QESMS-C-001
  version: A/0
content:
  检验、计量设备管理制度: '1.新购置的检验、测量和试验设备在开始使用前，应送国家授权或推荐的检定机构进行检定，合格后方能投入使用。

    2.在用的检验、测量和试验设备，按规定的检定周期送到法定的检定机构进行检定和校准。对无法送检的固定装置，可以请法定检测机构有资质的人员来本单位检定和校准。

    3.有些检验、测量和试验设备因国家未建立检定规程而无法检定的，由各基层公司计量员定期进行自校。

    4.超过检定周期的检验测量和试验设备，不允许使用。

    5.检试设备的检定合格证书由各送检单位计量员保存，计量员要将每台检试设备的检定情况写入“检定登记卡”，并备案。

    6.每台检试设备都要在合适的部位粘贴有表示检定状态的彩色标识。

    7.仪器设备由试验室统一管理，建立由设备管理员保管的仪器设备档案，其中内容包括：仪器的使用说明书、出厂合格证、检定证书、使用记录、维修记录等。

    8.检验和试验设备使用时做到用前、用后检查并做记录，检测人员要遵守仪器周围环境卫生，要做到管好、用好、会保养、会使用、会排除一般的故障。

    9.在用的检验、测量和试验设备必须要专人保管、使用、保养，以保证其灵敏度与准确性，非检测人员不得使用。

    10.检验、测量和试验人员应持证上岗，严格按设备说明书要求进行操作。

    11.检验设备在使用中失准时，使用人员应立即报告和停止作业，并由计量员检查经领导同意后贴上“禁用”标识。同时对已检测过的评定结果验证其有效性。

    12.检测设备在搬运、贮存期间，要采取防震、防潮等措施，摆放平稳、轻拿轻放，确保设备的准确度和适用性完好。搬运后重新安装的设备需进行校验。

    13.检测设备长期不用时，由各单位计量员贴上封存标识，，经各单位分管领导批准后生效，报废的检测设备必须贴上报废标识。禁止使用已报废的检测设备。'
