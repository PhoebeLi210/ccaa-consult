metadata:
  name: 软件设计开发管理制度
  code: TJ-QESMS-C-001
  version: A/0
  level: 3
  industry: software_development
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 目的
    content: |
      为规范公司软件设计开发过程，确保软件开发质量，满足客户要求和适用法律法规要求，特制定本制度。

  - title: 2. 适用范围
    content: |
      本制度适用于公司所有软件产品的设计开发活动，包括需求分析、设计、编码、测试、发布等全过程。

  - title: 3. 职责
    content: |
      3.1 技术部负责人
          - 负责软件设计开发项目的总体策划和管理
          - 审批设计开发计划和任务书
          - 组织设计开发评审和验收
      
      3.2 项目经理
          - 负责具体软件项目的实施管理
          - 协调项目资源，控制项目进度
          - 组织项目评审和变更管理
      
      3.3 设计开发人员
          - 负责软件需求分析、设计和编码
          - 执行设计开发计划，完成分配任务
          - 参与设计评审和测试
      
      3.4 测试人员
          - 负责软件测试计划的编制和执行
          - 执行测试用例，记录测试结果
          - 提交缺陷报告，跟踪缺陷修复

  - title: 4. 设计开发流程
    content: |
      4.1 项目立项
          - 接收客户或市场需求
          - 进行可行性分析
          - 编制项目建议书
          - 获得管理层批准
      
      4.2 需求分析
          - 收集和分析用户需求
          - 编制《软件需求规格说明书》
          - 进行需求评审和确认
      
      4.3 系统设计
          - 进行系统架构设计
          - 编制《软件设计说明书》
          - 进行设计评审
      
      4.4 编码实现
          - 按照设计进行编码
          - 执行代码审查
          - 进行单元测试
      
      4.5 软件测试
          - 编制测试计划
          - 设计测试用例
          - 执行测试并记录结果
          - 编制测试报告
      
      4.6 软件发布
          - 进行发布评审
          - 准备发布文档
          - 执行版本发布
          - 交付客户使用

  - title: 5. 设计开发文档要求
    content: |
      5.1 必需文档
          - 《软件需求规格说明书》
          - 《软件设计说明书》
          - 《软件测试计划》
          - 《软件测试报告》
          - 《用户操作手册》
      
      5.2 文档管理
          - 所有文档需经过评审和批准
          - 文档变更需执行变更控制程序
          - 文档版本需与软件版本对应

  - title: 6. 设计开发评审
    content: |
      6.1 评审时机
          - 需求分析完成后
          - 系统设计完成后
          - 测试完成后
          - 发布前
      
      6.2 评审内容
          - 是否满足需求
          - 技术可行性
          - 质量和风险
      
      6.3 评审记录
          - 保存《设计开发评审报告》
          - 跟踪评审发现问题的整改

  - title: 7. 设计开发变更
    content: |
      7.1 变更申请
          - 填写《设计开发更改记录》
          - 说明变更原因和影响
      
      7.2 变更评审
          - 评估变更的必要性和可行性
          - 评估对项目进度和成本的影响
      
      7.3 变更实施
          - 批准后进行变更
          - 更新相关文档
          - 进行必要的测试验证

  - title: 8. 相关文件
    content: |
      - 《文件控制程序》
      - 《记录控制程序》
      - 《产品和服务的设计开发程序》

  - title: 9. 相关记录
    content: |
      - 《设计开发计划书》
      - 《设计开发任务书》
      - 《软件需求规格说明书》
      - 《软件设计说明书》
      - 《软件测试计划》
      - 《软件测试报告》
      - 《设计开发评审报告》
      - 《设计开发更改记录》
      - 《软件版本发布记录》

variables:
  - name: effective_date
    description: 制度生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "技术部"
