  document_type: 三级文件
  document_name: XCYWY-QESMS-C-017工作人员考核制度
  document_code: XCYWY-QESMS-C-017
  version: A/0
content:
  工作人员考核标准: '1.1 工作态度考评标准：

    1.1.1 认真负责，能主动承担突发任务并高质量完成工作；

    1.1.2 以公司整体利益为重，不因个人原因影响团队或公司发展；

    1.1.3 熟悉所服务客户的基本情况及后续反馈，积极配合相关支持工作；

    1.1.4 具备成本意识，注重节约资源，能提出合理化降本建议。


    1.2 工作能力考评标准：

    1.2.1 能够准确理解岗位职责，快速响应并解决工作中出现的问题；

    1.2.2 熟练掌握本岗位所需技能和操作流程，独立高效完成工作任务；

    1.2.3 能够积极协助同事开展工作，具备良好的团队协作能力；

    1.2.4 对接过的任务或人员能准确记忆关键信息，避免工作遗漏；

    1.2.5 善于通过有效沟通引导合作，推动工作进展，提升工作效率；

    1.2.6 做好工作过程记录，善于总结分析，持续优化工作方法；

    1.2.7 熟悉相关部门或岗位的工作内容、流程与协作需求，提升协同效率；

    1.2.8 能对工作任务完成情况进行复盘，分析问题原因并提出改进措施；

    1.2.9 熟悉公司各项管理制度和业务流程，善于沟通协调，排除障碍，确保工作顺利推进。


    1.3 服务态度与职业形象考评标准：

    1.3.1 对待同事和客户友善诚恳，语气平和，态度热情有度；

    1.3.2 使用文明用语，尊重他人，工作中主动为他人着想；

    1.3.3 面对工作压力保持耐心，情绪稳定，积极应对各类情况；

    1.3.4 上班前做好情绪管理，精神饱满地投入工作；

    1.3.5 着装整洁得体，仪容端庄，符合岗位职业要求；

    1.3.6 电话沟通简洁明了，语气温和，表达清晰准确；

    1.3.7 文字交流字迹工整或格式规范，内容清楚无误。


    1.4 绩效考核操作方法：

    1.4.1 部门整体工作任务完成率；

    1.4.2 个人工作任务完成率；

    1.4.3 部门所负责事项的转化效率（如项目进度、问题闭环等）；

    1.4.4 个人所负责事项的转化效率；

    1.4.5 部门管理或服务对象的数量增长情况；

    1.4.6 个人对接客户或任务量的增长情况；

    1.4.7 部门业务覆盖范围或服务领域的拓展情况。'
  考核操作办法: "2.1 基本情况考核  \n2.1.1 考核目的：通过全面评估，发现不足，有针对性地提升员工综合素质与履职能力，打造专业化、高效化的员工队伍。\
    \  \n2.1.2 考核性质：采取定期与不定期相结合的综合性考核方式。  \n2.1.3 考核形式：  \nA. 定期考核：每月一次，由部门主管汇总并评定所属人员表现；\
    \  \nB. 不定期考核：由人力资源部或管理层进行抽查评估，作为补充评价依据。  \n2.1.4 管理保障：  \nA. 建立员工个人考核档案；  \n\
    B. 建立员工综合能力分析档案；  \nC. 制定并实施个性化培训与发展计划。"
