metadata:
  name: 售前支持服务规范
  code: XY-QESMS-C-002
  version: A/0
  level: 3
  industry: software_sales
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 目的
    content: |
      为规范公司售前支持服务，提高售前服务质量，满足客户需求，增强客户购买信心，特制定本规范。

  - title: 2. 适用范围
    content: |
      本规范适用于公司所有软件产品的售前支持服务活动。

  - title: 3. 职责
    content: |
      3.1 销售部
          - 负责客户需求收集和传递
          - 协调售前支持资源
          - 跟踪售前支持效果
      
      3.2 技术支持人员
          - 提供产品技术咨询
          - 进行产品演示和讲解
          - 编制技术解决方案
      
      3.3 销售人员
          - 了解客户需求并传递
          - 配合技术支持人员开展工作
          - 跟进客户反馈

  - title: 4. 售前支持内容
    content: |
      4.1 产品咨询
          - 详细介绍公司产品的种类及性能指标
          - 解答客户关于产品功能、性能的问题
          - 提供产品选型建议
      
      4.2 技术指导
          - 为产品选用提供技术指导
          - 解答技术实现问题
          - 提供技术方案建议
      
      4.3 产品演示
          - 根据客户需求安排产品演示
          - 展示产品功能和特点
          - 解答演示过程中的问题
      
      4.4 方案编制
          - 根据客户需求编制技术方案
          - 提供产品配置建议
          - 协助编制项目建议书

  - title: 5. 售前支持要求
    content: |
      5.1 响应要求
          - 用户来访、来函、来电，应及时登记
          - 客户一般性问题，应及时回复
          - 重大疑难问题回复时间不超过1个小时
      
      5.2 沟通要求
          - 与顾客沟通时，语言要礼貌
          - 回答问题简介直接，不拐弯抹角
          - 最后应礼貌的向顾客道谢
      
      5.3 形象要求
          - 服务人员统一着装
          - 不化浓妆
          - 保持良好的精神面貌
      
      5.4 现场服务要求
          - 现场服务人员遵守客户管理要求
          - 不得影响客户正常工作
          - 保持服务场所整洁

  - title: 6. 售前支持流程
    content: |
      6.1 需求接收
          - 接收客户咨询或需求
          - 登记客户信息和需求内容
          - 评估支持需求
      
      6.2 支持准备
          - 准备相关资料和工具
          - 安排技术支持人员
          - 确定支持方式和时间
      
      6.3 支持实施
          - 按照约定提供支持服务
          - 记录支持过程和结果
          - 解答客户问题
      
      6.4 效果跟踪
          - 收集客户反馈
          - 评估支持效果
          - 持续改进服务质量

  - title: 7. 相关文件
    content: |
      - 《销售管理制度》
      - 《售后服务管理制度》
      - 《与客户有关的过程控制程序》

  - title: 8. 相关记录
    content: |
      - 《客户咨询登记表》
      - 《售前支持记录表》
      - 《客户反馈记录表》

variables:
  - name: effective_date
    description: 规范生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "销售部"
