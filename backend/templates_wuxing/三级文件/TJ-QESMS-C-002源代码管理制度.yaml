metadata:
  name: 源代码管理制度
  code: TJ-QESMS-C-002
  version: A/0
  level: 3
  industry: software_development
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 目的
    content: |
      为规范公司源代码的管理，确保源代码的安全性、完整性和可追溯性，特制定本制度。

  - title: 2. 适用范围
    content: |
      本制度适用于公司所有软件产品的源代码管理，包括源代码的编写、存储、版本控制、备份等。

  - title: 3. 职责
    content: |
      3.1 技术部负责人
          - 负责源代码管理制度的制定和监督执行
          - 审批源代码访问权限
          - 组织源代码安全审计
      
      3.2 项目经理
          - 负责项目源代码的管理
          - 分配开发人员代码访问权限
          - 监督代码提交规范执行
      
      3.3 开发人员
          - 按照规范编写和提交代码
          - 及时提交代码到版本控制系统
          - 配合代码审查工作

  - title: 4. 源代码编写规范
    content: |
      4.1 编码规范
          - 遵循公司编码规范标准
          - 代码需添加必要的注释
          - 保持代码清晰、简洁、可读
      
      4.2 命名规范
          - 使用有意义的命名
          - 遵循命名约定（驼峰命名、下划线命名等）
          - 避免使用拼音或无意义字符
      
      4.3 代码质量
          - 代码需经过自测
          - 避免明显的逻辑错误
          - 遵循最佳实践和设计模式

  - title: 5. 版本控制管理
    content: |
      5.1 版本控制工具
          - 使用Git进行版本控制
          - 建立中央代码仓库
          - 定期同步代码到中央仓库
      
      5.2 分支管理
          - master/main分支：稳定版本
          - develop分支：开发版本
          - feature分支：功能开发
          - hotfix分支：紧急修复
      
      5.3 提交规范
          - 提交前进行代码自测
          - 编写清晰的提交说明
          - 定期进行代码提交
      
      5.4 代码合并
          - 功能开发完成后合并到develop分支
          - 发布前合并到master/main分支
          - 合并前进行代码审查

  - title: 6. 代码审查
    content: |
      6.1 审查时机
          - 代码合并前
          - 重要功能开发完成后
          - 定期代码走查
      
      6.2 审查内容
          - 代码规范性
          - 逻辑正确性
          - 安全性和性能
      
      6.3 审查记录
          - 记录审查发现的问题
          - 跟踪问题整改情况

  - title: 7. 源代码安全
    content: |
      7.1 访问控制
          - 按需分配代码访问权限
          - 离职人员及时收回权限
          - 定期审查访问权限
      
      7.2 代码保密
          - 源代码不得外传
          - 禁止在公共环境存储代码
          - 签订保密协议
      
      7.3 备份管理
          - 定期备份源代码
          - 异地存储备份
          - 定期测试备份恢复

  - title: 8. 相关文件
    content: |
      - 《文件控制程序》
      - 《记录控制程序》
      - 《软件设计开发管理制度》

  - title: 9. 相关记录
    content: |
      - 《代码审查记录》
      - 《源代码访问权限清单》
      - 《源代码备份记录》

variables:
  - name: effective_date
    description: 制度生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "技术部"
