document_info:
  document_type: 二级文件
  document_name: 相关方需求和期望控制程序
  document_code: XCYWY-QESMS-B-002
  version: A/0
purpose: 为满足质量管理体系(GB/T 19001—2016 idt ISO 9001:2015)&环境管理体系(GB/T 24001—2016 idt ISO
  14001:2015)&职业健康安全管理体系(GB/T 45001—2020 idt ISO 45001:2018)标准4.2的要求，确定与本公司管理体系有关的相关方及其要求，进行有效控制。
scope: 适用于与本公司质量管理体系有关的相关方。
responsibilities:
- 管理者代表为本程序的归口管理部门，负责组织本公司的相关方的分析与评价。
procedure_steps:
- "4.1组织应识别与公司质量管理体系有关的潜在相关方\n\t一顾客;        .\n\t一最终用户或受益人;\n\t一业主, 股东;\n\t一银行;\n\t\
  一外部供应商;\n\t一雇员及其它为组织工作者;\n\t一法律法规及监管机关;\n\t一地方社区团体;\n\t一非政府组织 。\n4.2确定这些相关方的要求，可包括:\n\
  \t一顾客对事物的要求,如符合性,价格,安全性;\n\t一已与顾客或外部供应商达成的合同;\n\t一行业规范及标准;\n\t一许可, 执照或其它授权形式;\n\t\
  一条约, 公约及草案;\n\t一和公共机构及顾客的协议,\n\t一组织契约合同的承担义务 。\n4.3为了解相关方的需求及期望,组织可进行下列活动:\n( 1\
  \ ) 通过下列方式收集信息:\n\t一头脑风暴;\n\t一游说和网络;\n\t一水平对比;\n\t一主动调査;\n\t一监视顾客需求、 期望及满意 。\n(2)通过以下方面建立确定相关性的准则: \n\
  \t一对组织绩效或决策的潜在影响或损害;\n\t一利益相关方产生风险及机遇的能力;\n\t一被组织决策或活动影响的能力。\n(3) 组织需建立相关的准则, 并利用该准则, 判定利益相关方及其相关要求。\n\
  (4)进行策划时(本标准第6章的要求),应考虑以上所述活动中获得的信息 。\n(5)组织应意识到各利益相关方及其要求可能是不断变化的,因此应定期进行监控及评审。"
records:
- 《相关方需求和期望识别表》
