document_info:
  document_type: 二级文件
  document_name: 目标指标和管理方案控制程序
  document_code: XCYWY-QESMS-B-005
  version: A/0
purpose: 明确公司、各部门有关工作方向、工作重点，制定管理体系目标及管理方案，并使之在受控状态下顺利实现。
scope: 适用于公司各个部门质量环境职业健康安全方面的工作目标及管理方案的制订和实施。
responsibilities:
- '3.1管理者代表负责制订公司的质量环境职业健康安全管理体系目标及管理方案。

  3.2总经理负责质量环境职业健康安全管理体系目标及管理方案的批准。

  3.3管理者代表负责质量环境职业健康安全管理体系管理方案分解落实、具体实施及过程监督。

  3.4公司部门各负其责，全力完成本部门的质量环境职业健康安全管理体系目标和指标。'
procedure_steps:
- 体系目标及管理方案制定的依据
- '4.1.1公司最高层对质量环境职业健康安全体系工作的要求以及顾客及相关方对公司的关注点。

  4.1.2公司的质量环境职业健康安全方针。

  4.1.3公司现有的资源状况（人力资源、设备设施、资金）及实施能力。

  4.1.4对公司的关键的质量目标、重要环安因素的全面了解。

  4.1.5适用的法律、法规和其他要求。

  4.1.6考虑通过工艺和开发或改进产品而给公司带来的商业机会。'
- 体系目标及管理方案的制定
- '4.2.1质量环境职业健康安全管理体系目标及管理方案由管理者代表负责制定。

  4.2.2制定的QES目标应包含对质量、环境、职业健康安全相关的承诺，应与企业制定的方针相协调。

  4.2.3管理体系目标要求可测量、可被监测。

  4.2.4管理方案制定要规定职责、方法和实施期限等。

  4.2.5目标确定后，由总经理批准后发布；管理方案由管理者代表制定，总经理批准，各部门实施；总经理负责监督检查管理方案的落实情况。'
- 目标和管理方案的实施
- '4.3.1公司围绕制定的管理体系方针，按质量环境职业健康安全管理标准要求，各职能部门各司其职，按照管理方案要求，尽力完成工作目标。

  4.3.2公司必须确保完成目标的一切资源。

  4.3.3不断通过培训手段提高员工综合素质，保证目标和管理方案的顺利实施、完成。

  4.3.4管理者代表对各部门的目标及管理方案的实施进度及完成情况进行跟踪、检查与评价。

  4.3.5目标未达到要求时，由各部门执行相应的改进控制程序。

  4.3.6通过内部审核和管理评审对目标和管理方案的有效性、符合性做出评价并提出改进措施。'
- 目标和管理方案的调整
- '4.4.1确因经营需要和客观条件变化，目标和管理方案需要进行调整时，由管理者代表提出调整方案，由总经理主持召开各相关部门进行评审，对提出的调整方案进行论证、分析、审批后，颁布实施。

  4.4.2部门目标及管理方案需要调整或延期时，应以书面形式阐述申请调整理由，报管理者代表统一研究、平衡，报总经理审批后进行调整。'
