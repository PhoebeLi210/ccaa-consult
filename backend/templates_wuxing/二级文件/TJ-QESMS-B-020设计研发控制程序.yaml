metadata:
  name: 设计研发控制程序
  code: TJ-QESMS-B-020
  version: A/0
  level: 2
  industry: software_development
  standard: ISO9001

sections:
  - title: 1. 目的
    content: |
      对设计和开发的全过程进行控制，确保设计开发输出满足输入要求，生产出满足客户和适用法律法规要求的产品。

  - title: 2. 适用范围
    content: |
      适用于公司软件产品的设计开发全过程，包括需求分析、系统设计、编码实现、测试验证、发布交付等各阶段。

  - title: 3. 术语和定义
    content: |
      3.1 设计开发：将要求转化为产品特性或规范的一组过程。
      3.2 设计开发输入：描述产品要求的信息。
      3.3 设计开发输出：满足输入要求的设计结果。
      3.4 设计开发评审：评价设计开发结果满足要求的能力。
      3.5 设计开发验证：通过提供客观证据对规定要求已得到满足的认定。
      3.6 设计开发确认：通过提供客观证据对特定的预期用途或应用要求已得到满足的认定。

  - title: 4. 职责
    content: |
      4.1 总经理
          - 审批设计开发项目立项
          - 审批设计开发计划
      
      4.2 技术部负责人
          - 组织设计开发策划
          - 审批设计开发输入和输出
          - 组织设计开发评审、验证和确认
      
      4.3 项目经理
          - 编制设计开发计划
          - 组织实施设计开发活动
          - 控制设计开发进度和质量
      
      4.4 设计开发人员
          - 执行设计开发任务
          - 编制设计开发文档
          - 参与设计开发评审
      
      4.5 测试人员
          - 编制测试计划
          - 执行测试活动
          - 编制测试报告

  - title: 5. 工作程序
    content: |
      5.1 设计开发策划
          5.1.1 项目立项
                - 收集和分析市场需求
                - 进行可行性分析
                - 编制《项目建议书》
                - 获得总经理批准
          
          5.1.2 制定计划
                - 项目经理编制《设计开发计划书》
                - 明确设计开发阶段
                - 确定各阶段任务和责任人
                - 确定评审、验证和确认活动
          
          5.1.3 计划审批
                - 《设计开发计划书》经技术部负责人审核
                - 报总经理批准

      5.2 设计开发输入
          5.2.1 输入内容
                - 功能和性能要求
                - 适用法律法规要求
                - 以前类似设计提供的信息
                - 所必需的其他要求
          
          5.2.2 输入评审
                - 对输入进行评审
                - 确保输入充分、完整、清晰
                - 解决相互冲突的要求
          
          5.2.3 输入确认
                - 编制《软件需求规格说明书》
                - 经技术部负责人审批
                - 作为设计开发依据

      5.3 设计开发输出
          5.3.1 输出内容
                - 《软件设计说明书》
                - 软件源代码
                - 测试计划和测试用例
                - 用户文档
          
          5.3.2 输出要求
                - 满足输入要求
                - 为后续过程提供充分信息
                - 包含或引用验收准则
          
          5.3.3 输出审批
                - 设计开发输出经技术部负责人审批
                - 批准后方可发布使用

      5.4 设计开发评审
          5.4.1 评审时机
                - 需求分析完成后
                - 系统设计完成后
                - 编码实现完成后
                - 测试完成后
          
          5.4.2 评审内容
                - 满足要求的能力
                - 识别问题并提出必要措施
          
          5.4.3 评审记录
                - 编制《设计开发评审报告》
                - 记录评审结论和措施
                - 跟踪措施落实情况

      5.5 设计开发验证
          5.5.1 验证方式
                - 软件测试
                - 代码审查
                - 演示评审
          
          5.5.2 验证实施
                - 编制《软件测试计划》
                - 执行测试并记录结果
                - 编制《软件测试报告》
          
          5.5.3 验证记录
                - 保存测试记录
                - 记录发现的问题
                - 跟踪问题整改

      5.6 设计开发确认
          5.6.1 确认方式
                - 用户试用
                - 验收测试
                - 评审确认
          
          5.6.2 确认条件
                - 产品已完成验证
                - 产品满足规定要求
                - 具备确认条件
          
          5.6.3 确认记录
                - 编制确认报告
                - 记录确认结果
                - 保存确认证据

      5.7 设计开发更改
          5.7.1 更改申请
                - 填写《设计开发更改记录》
                - 说明更改原因和内容
          
          5.7.2 更改评审
                - 评估更改对产品的影响
                - 确定更改的必要性和可行性
          
          5.7.3 更改实施
                - 批准后实施更改
                - 更新相关文档
                - 进行必要的验证和确认

      5.8 设计开发文档管理
          5.8.1 文档要求
                - 编制完整的设计开发文档
                - 文档需经评审和批准
                - 文档版本与产品版本对应
          
          5.8.2 文档保存
                - 按《文件控制程序》管理
                - 保存设计开发全过程记录
                - 确保文档可追溯

  - title: 6. 相关文件
    content: |
      - 《文件控制程序》
      - 《记录控制程序》
      - 《软件设计开发管理制度》
      - 《源代码管理制度》

  - title: 7. 相关记录
    content: |
      - 《项目建议书》
      - 《设计开发计划书》
      - 《设计开发任务书》
      - 《软件需求规格说明书》
      - 《软件设计说明书》
      - 《软件测试计划》
      - 《软件测试报告》
      - 《设计开发评审报告》
      - 《设计开发更改记录》
      - 《软件版本发布记录》

variables:
  - name: company_name
    description: 公司名称
    source: company.name
  
  - name: responsible_department
    description: 责任部门
    default: "技术部"
