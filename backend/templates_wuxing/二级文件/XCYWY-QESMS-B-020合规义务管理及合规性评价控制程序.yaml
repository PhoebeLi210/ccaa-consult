purpose: 为了识别适用于公司服务过程中风险因素的法律法规要求和其他应遵守的要求，并建立获取、传达、更新和评价的渠道，保持质量、环境、职业健康安全管理体系的运行满足法律法规和其他的要求。通过定期评价适用的法律法规及其他要求的遵守情况，发现公司在实施管理体系的过程中的违法风险和现象，以便及时的实施纠正或改进措施，从而履行公司遵循法律法规及其他要求的承诺，制定本程序。
