document_info:
  document_type: 二级文件
  document_name: 信息交流和沟通控制程序
  document_code: XCYWY-QESMS-B-010
  version: A/0
purpose: 为了规范公司管理体系相关信息内外部的交流与沟通，确保管理体系的有效运行，增进相互理解和信任，促进全员参与及业绩改进，增强管理体系的有效性，制订本程序。
scope: ''
responsibilities:
- '3.1.管理者代表：负责建立沟通过程，组织专题会议、例会，包括质量例会、环境保护专题会议、安全管理等；

  3.2.综合部：负责召集会议并记录和整理会议内容，负责与上级安全主管部门和行业主管部门的环境、职业健康安全管理信息的接收、传递和处理。

  3.3.市场部：负责产品和服务质量数据的信息交流。

  3.4.市场部：负责与客户沟通联络，并处理问题反馈。'
