document_info:
  document_type: 二级文件
  document_name: 环境、职业健康安全管理体系运行控制程序
  document_code: XCYWY-QESMS-B-013
  version: A/0
purpose: 根据实现环境、职业健康安全管理方针、目标以及遵守法规和其他要求的需要，使与风险有关的需要，均采取控制措施的运行和活动均处于有效的受控状态。并通过制定计划安排，确保控制措施的有效实施，特制定本程序。
scope: ''
responsibilities:
- '3.1管理者代表

  3.1.1负责编制环境、职业健康安全管理体系运行控制的文件、控制其分发并确保其有效实施。

  3.1.2负责提供运行控制的记录、表单。

  3.1.3负责对与环境、职业健康安全管理的运行控制的活动进行监测，确保其有效运行。

  3.1.4负责运行控制过程中向相关方通报有关程序和要求的信息。

  3.1.5负责对监测检查中发生的不符合，限期采取纠正、改进措施，并跟踪验证措施的有效性。

  3.2其他各部门

  3.2.1负责依据公司运行控制的标准模式，制定本部门各类运行控制文件，并确保其有效实施。

  3.2.2负责本部门运行控制程序执行情况的检查。

  3.2.3负责及时识别和更新新出现的风险和重要环境因素，采取相应的控制措施，并评审控制措施的有效性。

  3.2.4负责本部门在运行控制过程中发生的不符合的整改，并组织验证本项目实施的改进措施的有效性。'
procedure_steps: []
records:
