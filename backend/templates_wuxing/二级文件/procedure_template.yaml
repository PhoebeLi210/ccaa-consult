# 二级文件 - 程序文件通用模板
# 基于武汉鑫辰宇物业服务有限公司体系材料

# 文档元信息
document_info:
  document_type: "二级文件"
  document_name: "{{procedure_name}}"
  document_code: "{{company_code}}-QESMS-B-{{procedure_number}}"
  version: "A/0"
  issue_date: "{{issue_date}}"
  implementation_date: "{{implementation_date}}"
  related_standards:
    - standard: "{{related_standard}}"
      clause: "{{standard_clause}}"

# 目的
purpose: |
  {{purpose_description}}

# 适用范围
scope: |
  {{scope_description}}

# 职责
responsibilities:
  - department: "{{responsible_department}}"
    duties:
      - "{{duty_1}}"
      - "{{duty_2}}"
  - department: "{{cooperating_department}}"
    duties:
      - "{{duty_3}}"

# 工作程序
procedure:
  - step: 1
    title: "{{step_1_title}}"
    content: |
      {{step_1_content}}
    responsible: "{{step_1_responsible}}"
    records:
      - "{{record_1}}"
  
  - step: 2
    title: "{{step_2_title}}"
    content: |
      {{step_2_content}}
    responsible: "{{step_2_responsible}}"
    records:
      - "{{record_2}}"

# 相关文件
related_documents:
  - "{{related_document_1}}"
  - "{{related_document_2}}"

# 记录
records:
  - name: "{{record_name}}"
    code: "{{record_code}}"
    retention_period: "{{retention_period}}"

# 变量定义
variables:
  procedure_name:
    description: "程序文件名称"
    example: "组织环境分析控制程序"
  procedure_number:
    description: "程序文件编号"
    example: "001"
  purpose_description:
    description: "目的描述"
    example: "为满足质量管理体系(GB/T 19001—2016 idt ISO 9001:2015)&环境管理体系(GB/T 24001—2016 idt ISO 14001:2015)&职业健康安全管理体系(GB/T 45001—2020 idt ISO 45001:2018)标准4.1的要求，确定与本公司目标和战略方向相关并影响实现质量管理体系预期结果的各种内部和外部因素，对其进行有效控制。"
  scope_description:
    description: "适用范围描述"
    example: "适用于对本公司经营环境内外部因素识别、评价。"
  responsible_department:
    description: "责任部门"
    example: "管理者代表"
