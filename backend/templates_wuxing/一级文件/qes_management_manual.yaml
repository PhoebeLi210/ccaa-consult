# 一级文件 - 质量/环境/职业健康安全管理手册 YAML模板
# 基于武汉鑫辰宇物业服务有限公司体系材料

# 文档元信息
document_info:
  document_type: "一级文件"
  document_name: "质量环境职业健康安全管理手册"
  document_code: "{{company_code}}-QESMS-A-001"
  version: "A/0"
  issue_date: "{{issue_date}}"
  implementation_date: "{{implementation_date}}"
  
# 标准引用
standards:
  - name: "GB/T 19001—2016 idt ISO 9001:2015"
    description: "质量管理体系 要求"
  - name: "GB/T 24001—2016 idt ISO 14001:2015"
    description: "环境管理体系 要求及使用指南"
  - name: "GB/T 45001—2020 idt ISO 45001:2018"
    description: "职业健康安全管理体系 要求及使用指南"

# 公司信息
company_info:
  name: "{{company_name}}"
  established_date: "{{established_date}}"
  registered_address: "{{registered_address}}"
  legal_representative: "{{legal_representative}}"
  business_scope: "{{business_scope}}"
  office_address: "{{office_address}}"

# 目录结构
table_of_contents:
  - section: "0.1"
    title: "前言"
    subsections:
      - "0.1.1 管理手册编制说明"
      - "0.1.2 管理手册的管理"
      - "0.1.3 管理手册的修订及版次管理"
  - section: "0.2"
    title: "公司简介"
  - section: "0.3"
    title: "管理手册颁布令"
  - section: "0.4"
    title: "管理者代表任命书"
  - section: "0.5"
    title: "质量、环境、职业健康安全方针和目标发布令"
  - section: "0.6"
    title: "管理组织结构图"
  - section: "0.7"
    title: "职能分配表"
  - section: "1"
    title: "范围"
  - section: "2"
    title: "规范性引用文件"
  - section: "3"
    title: "术语和定义"
  - section: "4"
    title: "组织的环境"
  - section: "5"
    title: "领导作用"
  - section: "6"
    title: "策划"
  - section: "7"
    title: "支持"
  - section: "8"
    title: "运行"
  - section: "9"
    title: "绩效评价"
  - section: "10"
    title: "改进"

# 正文内容
content:
  # 前言
  preface:
    compilation_statement: |
      手册依据GB/T 19001—2016 idt ISO 9001:2015《质量管理体系 要求》、
      GB/T 24001—2016 idt ISO 14001:2015《环境管理体系 要求及使用指南》、
      GB/T 45001—2020 idt ISO 45001:2018《职业健康安全管理体系 要求及使用指南》标准，
      结合公司实际编制而成，它规定了公司管理体系要求，包括：
      a）公司质量、环境、职业健康安全管理体系范围（详见第1章）；
      b）标准及公司所确定的管理体系程序文件。
    
    manual_management: |
      管理手册为受控文件，由总经理批准颁布，综合部统一归口管理。
      未经管理者代表批准，任何人不得将管理手册提供给公司以外的人员。
      管理手册持有者在调离工作岗位时应办理管理手册移交手续。
      管理手册持有者应妥善保管，不得损坏、丢失和随意涂抹。
    
    revision_management: |
      管理手册修改应按《文件控制程序》的规定执行。
      版次—代表手册的发布版本，从"A/0"开始。
      当任何章节修改状态更新超过五次或有重大修改时，手册要重新发布新版本。

  # 公司简介
  company_introduction: "{{company_introduction}}"

  # 颁布令
  proclamation:
    content: |
      公司依据GB/T 19001—2016 idt ISO 9001:2015《质量管理体系 要求》、
      GB/T 24001—2016 idt ISO 14001:2015《环境管理体系 要求及使用指南》、
      GB/T 45001—2020 idt ISO 45001:2018《职业健康安全管理体系 要求及使用指南》标准，
      结合公司的实际编制完成了《管理手册》，现予以批准发布实施。
    general_manager: "{{general_manager}}"
    sign_date: "{{sign_date}}"

  # 管理者代表任命书
  management_representative_appointment:
    appointee: "{{management_representative}}"
    content: |
      为确保我公司贯彻GB/T 19001—2016 idt ISO 9001:2015《质量管理体系 要求》、
      GB/T 24001—2016 idt ISO 14001:2015《环境管理体系 要求及使用指南》及
      GB/T 45001—2020 idt ISO 45001:2018《职业健康安全管理体系 要求及使用指南》标准，
      从而推动公司质量环境职业健康安全管理工作的开展，
      确保公司质量环境职业健康安全管理体系正常有效地运行，
      经公司最高管理层研究，决定任命。
    general_manager: "{{general_manager}}"
    sign_date: "{{sign_date}}"

  # 员工代表任命书
  employee_representative_appointment:
    appointee: "{{employee_representative}}"
    responsibilities:
      - "代表全体员工参与管理方针和目标的制定和评审"
      - "代表全体员工参与实施危险源辨识、风险评价和风险控制过程和程序而进行风险管理的决策"
      - "代表全体员工参与影响工作场所职业健康安全的协商和决策活动"
      - "代表全体员工参与事故和事件调查及现场职业健康安全检查"
      - "负责收集员工在职业健康安全方面的需求和期望并代表员工向公司领导层反馈"
    general_manager: "{{general_manager}}"
    sign_date: "{{sign_date}}"

  # 方针和目标
  policy_and_objectives:
    quality_policy: "{{quality_policy}}"
    environment_policy: "{{environment_policy}}"
    occupational_health_policy: "{{occupational_health_policy}}"
    
    integrated_policy: |
      专业服务,客户满意；环保高效,绿色发展；安全规范,健康保障。
    
    policy_meaning: |
      专业服务,客户满意:我们以专业的物业管理服务为核心,不断提升服务质量,确保客户的需求得到及时响应和满足。
      环保高效,绿色发展:在物业管理过程中注重资源节约和环境保护,通过高效管理减少浪费,推动绿色可持续发展。
      安全规范,健康保障:严格执行安全管理制度,为客户提供安全、舒适的环境,保障员工及业主的生命财产安全。
    
    quality_objectives:
      - "服务满意率达90%以上"
      - "合同履约率100%"
    
    environment_objectives:
      - "废弃物100%分类处理"
      - "杜绝火灾、触电事故发生"
    
    occupational_health_objectives:
      - "环保投诉率为零"
      - "轻伤事故每年控制在2起以下"

  # 组织架构
  organization_structure:
    general_manager: "{{general_manager}}"
    management_representative: "{{management_representative}}"
    departments:
      - name: "{{department_1_name}}"
        manager: "{{department_1_manager}}"
      - name: "{{department_2_name}}"
        manager: "{{department_2_manager}}"
      - name: "{{department_3_name}}"
        manager: "{{department_3_manager}}"
    employee_representative: "{{employee_representative}}"

  # 第1章 范围
  chapter_1_scope:
    general: |
      本手册规定了公司的质量、环境、职业健康安全管理体系要求，
      适用于公司物业管理服务及相关管理活动。
    application: |
      本手册适用于公司质量、环境、职业健康安全管理体系的建立、实施、保持和改进。

  # 第2章 规范性引用文件
  chapter_2_normative_references:
    standards:
      - "GB/T 19001—2016 idt ISO 9001:2015 质量管理体系 要求"
      - "GB/T 24001—2016 idt ISO 14001:2015 环境管理体系 要求及使用指南"
      - "GB/T 45001—2020 idt ISO 45001:2018 职业健康安全管理体系 要求及使用指南"

  # 第3章 术语和定义
  chapter_3_terms_and_definitions: |
    本手册采用GB/T 19001—2016、GB/T 24001—2016、GB/T 45001—2020标准中的术语和定义。

  # 第4章 组织的环境
  chapter_4_context:
    understanding_organization:
      procedure: "XCYWY-QESMS-B-001组织环境分析控制程序"
      method: "SWOT分析法"
      internal_factors:
        - "有利的竞争态势"
        - "充足的财政来源"
        - "良好的企业形象"
        - "技术力量"
        - "产品质量"
        - "市场份额"
      external_factors:
        - "新产品"
        - "新市场"
        - "新需求"
        - "竞争对手失误"
        - "市场紧缩"
        - "行业政策变化"
    
    interested_parties:
      procedure: "XCYWY-QESMS-B-002相关方需求和期望控制程序"
      parties:
        - name: "客户"
          requirements: "服务质量、响应速度"
        - name: "员工"
          requirements: "工作环境、薪酬福利"
        - name: "供应商"
          requirements: "付款及时、合作稳定"
        - name: "政府监管部门"
          requirements: "合规经营、安全生产"
    
    scope_determination: |
      本公司管理体系的范围包括：物业管理服务、水电安装、停车服务、
      五金交电及建筑材料销售、保洁服务、园林绿化工程设计施工等。
    
    management_system_processes:
      pdca_cycle: true
      process_approach: true
      risk_based_thinking: true

  # 第5章 领导作用
  chapter_5_leadership:
    leadership_commitment:
      - "对管理体系的有效性负责"
      - "确保制定管理体系方针和目标"
      - "确保管理体系要求融入业务过程"
      - "促进使用过程方法和基于风险的思维"
      - "确保管理体系所需资源"
      - "传达有效管理体系和符合要求的重要性"
      - "确保管理体系实现其预期结果"
      - "支持其他管理人员在其职责范围内发挥作用"
    
    policy:
      quality: "{{quality_policy}}"
      environment: "{{environment_policy}}"
      occupational_health: "{{occupational_health_policy}}"
    
    organizational_roles:
      general_manager:
        responsibilities:
          - "制定公司发展战略和经营方针"
          - "批准管理手册和程序文件"
          - "任命管理者代表"
          - "主持管理评审"
          - "提供管理体系所需资源"
      
      management_representative:
        responsibilities:
          - "确保管理体系过程得到建立、实施和保持"
          - "向最高管理者报告管理体系业绩和改进需求"
          - "确保在整个组织内提高满足顾客要求的意识"
          - "负责管理体系有关事宜的外部联络"
      
      employee_representative:
        responsibilities:
          - "参与管理方针和目标的制定和评审"
          - "参与危险源辨识、风险评价和风险控制过程"
          - "参与影响工作场所职业健康安全的协商和决策"
          - "参与事故和事件调查及现场职业健康安全检查"
    
    worker_consultation:
      - "通过员工代表参与管理体系相关事务"
      - "定期召开员工座谈会"
      - "建立意见收集和反馈机制"

  # 第6章 策划
  chapter_6_planning:
    risks_and_opportunities:
      procedure: "XCYWY-QESMS-B-003风险与机遇识别评价控制程序"
      methods:
        - "SWOT分析"
        - "PEST分析"
        - "风险矩阵"
    
    quality_objectives:
      - objective: "服务满意率达90%以上"
        measurement: "客户满意度调查"
        target_date: "{{target_date}}"
      - objective: "合同履约率100%"
        measurement: "合同执行记录"
        target_date: "{{target_date}}"
    
    environment_objectives:
      - objective: "废弃物100%分类处理"
        measurement: "废弃物处理记录"
        target_date: "{{target_date}}"
      - objective: "杜绝火灾、触电事故发生"
        measurement: "事故记录"
        target_date: "{{target_date}}"
    
    occupational_health_objectives:
      - objective: "环保投诉率为零"
        measurement: "投诉记录"
        target_date: "{{target_date}}"
      - objective: "轻伤事故每年控制在2起以下"
        measurement: "事故统计"
        target_date: "{{target_date}}"
    
    management_programs:
      - name: "质量管理方案"
        document: "{{quality_management_program}}"
      - name: "环境管理方案"
        document: "{{environment_management_program}}"
      - name: "职业健康安全管理方案"
        document: "{{occupational_health_management_program}}"
    
    change_planning:
      - "变更前进行评审"
      - "识别变更带来的风险和机遇"
      - "确保管理体系完整性"

  # 第7章 支持
  chapter_7_support:
    resources:
      human_resources:
        procedure: "XCYWY-QESMS-B-009人力资源控制程序"
        requirements: "配备具备相应能力的人员"
      
      infrastructure:
        procedure: "XCYWY-QESMS-B-006基础设施和工作环境控制程序"
        includes:
          - "办公设备"
          - "通讯设备"
          - "交通工具"
          - "工作场所"
      
      work_environment:
        physical: "适宜的温度、湿度、照明"
        social: "良好的工作氛围、团队协作"
        psychological: "减少工作压力、关注员工心理健康"
      
      monitoring_equipment:
        procedure: "XCYWY-QESMS-B-007监视和测量设备控制程序"
        includes:
          - "计量器具"
          - "检测设备"
          - "校准记录"
      
      knowledge:
        procedure: "XCYWY-QESMS-B-008组织知识控制程序"
        includes:
          - "内部知识积累"
          - "外部知识获取"
          - "知识传承机制"
    
    competence:
      procedure: "XCYWY-QESMS-B-009人力资源控制程序"
      requirements:
        - "确定岗位能力要求"
        - "提供培训或采取其他措施"
        - "评价培训效果"
        - "保持能力记录"
    
    awareness:
      - "理解管理方针"
      - "了解管理体系目标"
      - "认识工作相关性和重要性"
      - "了解不符合的后果"
    
    communication:
      procedure: "XCYWY-QESMS-B-010信息交流和沟通控制程序"
      internal:
        - "部门间沟通"
        - "上下级沟通"
        - "员工代表沟通"
      external:
        - "客户沟通"
        - "供应商沟通"
        - "监管部门沟通"
    
    documented_information:
      procedure: "XCYWY-QESMS-B-012文件控制程序"
      creation_and_update:
        - "标识和描述"
        - "格式和媒介"
        - "评审和批准"
      control:
        - "分发、访问、检索和使用"
        - "存储和防护"
        - "变更控制"
        - "保留和处置"
      records:
        procedure: "XCYWY-QESMS-B-011记录控制程序"
        requirements:
          - "标识"
          - "存储"
          - "保护"
          - "检索"
          - "保留"
          - "处置"

  # 第8章 运行
  chapter_8_operation:
    operational_planning:
      procedure: "XCYWY-QESMS-B-013环境、职业健康安全管理体系运行控制程序"
      requirements:
        - "建立过程准则"
        - "实施过程控制"
        - "保持成文信息"
    
    customer_requirements:
      procedure: "XCYWY-QESMS-B-015与客户有关的过程控制程序"
      activities:
        - "客户需求识别"
        - "合同评审"
        - "变更控制"
    
    design_and_development:
      applicability: "不适用"
      reason: "本公司从事物业管理服务，不涉及设计和开发活动"
    
    external_provision:
      procedure: "XCYWY-QESMS-B-016外部提供过程、产品和服务的控制程序"
      types:
        - "外部供方提供的产品和服务"
        - "外包过程"
      control_methods:
        - "供应商评价和选择"
        - "供应商绩效监控"
        - "采购信息确认"
    
    service_provision:
      procedure: "XCYWY-QESMS-B-017服务提供控制程序"
      requirements:
        - "服务特性描述"
        - "监视和测量"
        - "基础设施维护"
        - "监视和测量设备使用"
        - "人员能力"
        - "确认和验证"
    
    service_release:
      procedure: "XCYWY-QESMS-B-018服务监视和测量控制程序"
      requirements:
        - "完成策划的活动"
        - "验证符合要求"
        - "授权放行"
    
    nonconforming_output:
      procedure: "XCYWY-QESMS-B-024不合格（不符合）控制程序"
      actions:
        - "纠正"
        - "隔离、限制、退货或暂停"
        - "告知顾客"
        - "采取补救措施"
    
    environmental_safety_operation:
      procedure: "XCYWY-QESMS-B-013环境、职业健康安全管理体系运行控制程序"
      requirements:
        - "建立控制准则"
        - "实施过程控制"
        - "管理变更"
        - "外包控制"
    
    emergency_preparedness:
      procedure: "XCYWY-QESMS-B-014应急准备和响应控制程序"
      requirements:
        - "识别潜在紧急情况"
        - "制定应急预案"
        - "定期演练"
        - "评审和修订"

  # 第9章 绩效评价
  chapter_9_performance_evaluation:
    monitoring_measurement:
      procedure: "XCYWY-QESMS-B-019管理体系监视和测量控制程序"
      quality:
        procedure: "XCYWY-QESMS-B-018服务监视和测量控制程序"
        items:
          - "服务过程质量"
          - "产品检验"
          - "过程参数"
      environment:
        items:
          - "环境因素监测"
          - "能源消耗"
          - "废弃物处理"
      occupational_health:
        items:
          - "危险源监测"
          - "职业健康检查"
          - "安全检查"
    
    customer_satisfaction:
      procedure: "XCYWY-QESMS-B-021客户满意度监测控制程序"
      methods:
        - "客户满意度调查"
        - "客户反馈分析"
        - "投诉处理"
    
    analysis_and_evaluation:
      methods:
        - "数据分析"
        - "趋势分析"
        - "对比分析"
      outputs:
        - "产品和服务符合性"
        - "顾客满意程度"
        - "管理体系绩效"
        - "策划实施有效性"
    
    internal_audit:
      procedure: "XCYWY-QESMS-B-022内部审核控制程序"
      frequency: "每年至少一次"
      requirements:
        - "制定审核方案"
        - "选择合格审核员"
        - "编制检查表"
        - "编写审核报告"
        - "跟踪纠正措施"
    
    management_review:
      procedure: "XCYWY-QESMS-B-023管理评审控制程序"
      frequency: "每年至少一次"
      inputs:
        - "以往管理评审措施的状态"
        - "内外部因素的变化"
        - "管理体系绩效和有效性信息"
        - "资源的充分性"
        - "应对风险和机遇措施的有效性"
        - "改进机会"
      outputs:
        - "改进机会"
