# 智质通·咨询版 - 行业模板配置
# 基于武汉永欣智能科技、武汉润通和机电设备、武汉鑫辰宇物业的体系文件分析

# ==================== 行业分类配置 ====================
industries:
  # 智能科技行业
  intelligent_technology:
    name: "智能科技行业"
    code: "INTELLIGENT_TECH"
    description: "智能产品研发、销售，涉及设计开发过程，软件/硬件结合"
    representative_company: "武汉永欣智能科技有限公司"
    
    business_characteristics:
      - "智能产品研发、销售"
      - "涉及设计开发过程"
      - "软件/硬件结合"
      - "技术服务"
      - "项目制管理"
    
    special_requirements:
      procedures:
        - code: "B-016"
          name: "产品和服务的设计开发程序"
          required: true
          description: "智能科技行业必备，控制产品设计开发过程"
      
      instructions:
        - name: "设计开发管理制度"
          required: true
        - name: "技术文件管理制度"
          required: true
        - name: "知识产权管理制度"
          required: false
      
      forms:
        - name: "项目建议书"
          code: "D-001"
        - name: "设计开发计划书"
          code: "D-002"
        - name: "设计开发任务书"
          code: "D-003"
        - name: "设计开发方案"
          code: "D-004"
        - name: "设计开发输入清单"
          code: "D-005"
        - name: "设计开发输出清单"
          code: "D-006"
        - name: "设计开发评审报告"
          code: "D-009"
        - name: "设计开发更改记录"
          code: "D-007"
    
    required_company_materials:
      basic:
        - name: "营业执照"
          required: true
          description: "必备，用于确认企业名称、统一社会信用代码、经营范围"
        - name: "组织架构图"
          required: true
          description: "必备，显示部门设置和汇报关系"
        - name: "员工花名册"
          required: true
          description: "必备，包含姓名、部门、岗位、入职时间"
      
      business:
        - name: "产品/服务清单"
          required: true
          description: "必备，明确认证范围和产品类型"
        - name: "设计开发项目案例"
          required: true
          description: "至少1-2个完整的设计开发项目资料"
        - name: "软件著作权或专利证书"
          required: false
          description: "如有，提供知识产权证明"
      
      site:
        - name: "场地租赁合同或产权证明"
          required: true
          description: "必备，证明经营场所合法性"
        - name: "研发场地照片"
          required: false
          description: "展示研发环境和设备"

  # 机电设备行业
  electromechanical_equipment:
    name: "机电设备行业"
    code: "ELECTROMECHANICAL"
    description: "机电设备销售、安装调试、维护保养"
    representative_company: "武汉润通和机电设备有限公司"
    
    business_characteristics:
      - "机电设备销售"
      - "设备安装调试"
      - "设备维护保养"
      - "售后服务"
      - "贸易型业务"
    
    special_requirements:
      procedures: []
      
      instructions:
        - name: "设备操作规程"
          required: true
        - name: "设备维护保养规程"
          required: true
        - name: "设备安全操作规程"
          required: true
      
      forms:
        - name: "设备台账"
          code: "D-018"
        - name: "设备点检表"
          code: "D-019"
        - name: "设备维护保养计划"
          code: "D-021"
        - name: "设备维保记录"
          code: "D-021"
        - name: "物体打击应急预案及演练"
          code: "D-045"
        - name: "机械伤害应急预案及演练"
          code: "D-046"
    
    required_company_materials:
      basic:
        - name: "营业执照"
          required: true
          description: "必备"
        - name: "组织架构图"
          required: true
          description: "必备"
        - name: "员工花名册"
          required: true
          description: "必备"
      
      business:
        - name: "设备销售合同"
          required: true
          description: "至少2-3份，证明销售业务"
        - name: "设备采购合同"
          required: true
          description: "至少2-3份，证明采购渠道"
        - name: "设备清单"
          required: true
          description: "主要销售的设备型号和规格"
      
      site:
        - name: "场地租赁合同"
          required: true
          description: "必备"
        - name: "仓库照片"
          required: false
          description: "展示设备存储条件"

  # 物业服务行业
  property_service:
    name: "物业服务行业"
    code: "PROPERTY_SERVICE"
    description: "物业管理服务、保洁、绿化、安保"
    representative_company: "武汉鑫辰宇物业服务有限公司"
    
    business_characteristics:
      - "物业管理服务"
      - "保洁服务"
      - "绿化养护"
      - "安保服务"
      - "客户服务"
    
    special_requirements:
      procedures:
        - code: "B-018"
          name: "服务提供控制程序"
          required: true
      
      instructions:
        - name: "保洁作业指导书"
          required: true
        - name: "绿化养护作业指导书"
          required: true
        - name: "安保服务规范"
          required: true
        - name: "客户服务规范"
          required: true
      
      forms:
        - name: "保洁检查记录"
          code: "D-XXX"
        - name: "绿化养护记录"
          code: "D-XXX"
        - name: "安保巡逻记录"
          code: "D-XXX"
        - name: "客户投诉处理记录"
          code: "D-XXX"
        - name: "服务满意度调查表"
          code: "D-XXX"
    
    required_company_materials:
      basic:
        - name: "营业执照"
          required: true
        - name: "组织架构图"
          required: true
        - name: "员工花名册"
          required: true
      
      business:
        - name: "物业服务合同"
          required: true
          description: "至少2-3份在管项目合同"
        - name: "服务项目清单"
          required: true
          description: "在管项目列表"
        - name: "外包合同"
          required: false
          description: "保洁、安保等外包服务合同"
      
      site:
        - name: "办公场地证明"
          required: true
          description: "物业办公场地"
        - name: "在管项目照片"
          required: false
          description: "展示服务现场"

