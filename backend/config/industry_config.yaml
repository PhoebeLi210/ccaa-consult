software_templates:
  system_documents:
    description: 体系文件模板，根据行业自动生成
    items:
    - 一级文件：管理手册模板
    - 二级文件：26个程序文件模板
    - 三级文件：行业特定的作业指导书模板
    - 四级文件：记录表格模板
  company_materials:
    description: 企业资料填写模板
    items:
    - name: 组织架构图模板
      description: 标准组织架构图，用户填写部门名称和人员
    - name: 岗位说明书模板
      description: 各岗位任职要求和工作职责
    - name: 目标指标模板
      description: 质量/环境/安全目标分解表
    - name: 环境因素识别表
      description: 环境因素识别与评价模板
    - name: 危险源识别表
      description: 危险源辨识与风险评价模板
    - name: 法律法规清单模板
      description: 适用法律法规识别清单
  operation_records:
    description: 运行记录模板
    items:
    - name: 内部审核记录
      description: 内审计划、检查表、不符合报告
    - name: 管理评审记录
      description: 管评计划、输入资料、报告
    - name: 培训记录
      description: 培训计划、培训记录表
    - name: 设备管理记录
      description: 设备台账、维保记录
    - name: 应急预案
      description: 各类应急预案及演练记录
missing_materials_config:
  alert_levels:
    critical:
      description: 关键材料缺失，无法生成体系文件
      action: 必须提醒用户补充
    warning:
      description: 重要材料缺失，影响体系完整性
      action: 提醒用户补充或提供模板
    info:
      description: 可选材料缺失
      action: 提供模板供用户选择填写
  workflow:
  - step: 1
    name: 材料清单检查
    description: 根据行业类型生成必需材料清单
  - step: 2
    name: 用户材料上传
    description: 用户上传已有材料
  - step: 3
    name: 缺失材料识别
    description: 系统自动识别缺失材料
  - step: 4
    name: 模板提供
    description: 为缺失材料提供填写模板
  - step: 5
    name: 材料完善
    description: 用户填写并上传缺失材料
  - step: 6
    name: 体系文件生成
    description: 所有材料齐全后生成体系文件
