document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-007保险柜操作规程
  document_code: XCYWY-QESMS-C-007
  version: A/0
content:
  目的: 确保业务人员正确操作保险柜，保护重要物品的安全性，避免因操作不当导致的财产损失，规范操作流程，提高工作效率，减少设备故障风险。
  设备使用规范: '一、使用的前的准备

    1、检查保险柜是否放置于平稳且干燥的地面，避免倾斜或受潮环境，确保四周通风良好。

    2、确认电源电压是否符合设备要求（通常为220V或380V，根据设备说明书为准），检查电源线缆完好无损并连接牢固，确保接地线连接可靠。

    3、检查保险柜门锁是否关闭严密，确认机械锁和电子锁均处于锁定状态，钥匙或密码（如适用）需妥善保管。

    4、检查电池或备用电源是否正常（若设备配备有备用电池），确保电池电量充足或已连接外部稳定电源。

    二、设备开启步骤

    1、按下电源开关，等待保险柜控制系统启动自检程序。

    2、观察显示屏（如适用）上的状态指示灯，确保所有提示均为正常绿色或无异常报警信号。

    3、根据实际需求输入密码或扫描指纹（如设备支持生物识别功能），完成身份验证后方可进入操作界面。

    4、按设备说明进行初始参数设定，例如设置延迟时间、报警阈值或存储记录权限（如涉及）。

    三、日常操作流程

    1、当需要存取物品时，先确认当前环境安全，无未经授权人员靠近。

    2、输入正确的密码或验证身份信息，按照屏幕提示打开保险柜门。

    3、取出或存放所需物品后，立即关闭保险柜门，并确保门锁自动锁闭或手动锁好。

    4、记录存取时间及操作人员信息（如企业内部管理需要）。

    四、设备关机步骤

    1、完成所有存取操作后，退出操作界面并断开当前用户会话。

    2、按顺序依次关闭电子锁、照明设备及主电源开关。

    3、确保保险柜门已完全锁闭并保持密封状态。

    五、注意事项

    1、定期检查保险柜表面及内部是否有污渍或损坏迹象，如有问题及时联系专业维修人员处理。

    2、避免将重物压在保险柜表面或强行撬动门锁，以免损坏设备结构。

    3、严禁私自拆卸内部电路板或修改原厂设定参数，防止引发安全隐患。

    4、注意保管好保险柜钥匙或密码，不得随意泄露给无关人员。

    5、长期不使用时应拔掉电源插头，并保持保险柜内部干燥。'
