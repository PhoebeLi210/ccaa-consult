document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-014设施设备安全管理制度
  document_code: XCYWY-QESMS-C-014
  version: A/0
content:
  总则: '1）为提高公司设施管理水平，以达到保障质量、降低成本、安全生产及提高经济效益的目的，制定本制度。

    2）本制度适用于公司所有的设备管理。

    3）设备管理的原则：依靠技术进步、促进企业发展、预防设备事故，管理与使用相结合、定时维护与定期检修相结合、修理与更新相结合、专业管理与全员管理相结合。

    4）设备管理的主要任务：是对设备的综合管理，保持设备完好，不断改善和提高公司装备的技术素质，充分发挥设备效能，合理调配使用，争取良好的经济效益。

    5）公司明确由综合部负责设备管理工作，对所有设备实行统一管理、统一编号、登记台帐，做到帐物相符、明细清楚。'
  设备规划: '1）设备采购必须选择正规厂商，并货比二家以上。

    2）设备安装必须由有资质单位进行安装。安装结束后要进行测试及试验，并出具报告。危险区域的电气设备要由专业许可人员进行安装、改造。

    3）库存设备管理要严格，并专人负责，做到入库设备严格验收、登记上帐、妥善保管，确保“三好出库”。'
  固定资产管理: '1）公司所属固定资产为此设备使用年限在一年以上，单位价值在20000.00元及以上者。

    2）综合部建立设备技术档案，保存技术资料。

    3）设备技术档案要对设备的验收、增减、转移、报废等做好业务记录，并于年末进行实地检查、盘点，做到帐、物、卡相符合，出现问题及时处理。

    4）新投产设备应严格执行竣工验收制度，安装部门应提供全部有关技术资料及完整的安装施工记录与图纸，具体验收工作由综合部负责，验收后的原始资料存入技术档案。

    5）特种设备必须按规定进行定期检验，检验合格，取得检验合格报告。

    6）设备的革新改造，应予先制定技术方案或设计，报主管机关审批，如审定应记入档案。

    7）符合报废条件要报废的固定资产，由使用部门提出申请，综合部组织鉴定后，填写设备报废申请书，报总经理审批，已批准报废的固定资产应移交综合部进行处理。'
  设备的使用与维修: "1）各部门应建立健全设备的操作规程，明确维护责任人。设备的操作和维护人员必须严格遵守。\n2）由部门经理安排设备养护，保证设备的完好，提高利用率。\
    \ \n3）综合部组织各相关部门参与对设备使用、维护知识进行培训。\n4）需取得专用安全标志的设备必须取得专用安全标志，电气设备、刀闸、开关等要有永久性标签。\n\
    5）主要设备要实行预修预检，其安全装置、各种仪表等必须按规定送检。\n6）检修、大修必须依据实际情况确定，设备检修前应做好组织准备工作，检修计划提前上报，设备损坏严重、残余价值很小的，不列入检修计划。\
    \ \n7）大修设备拆装时，必须经综合部进行检验确认，以备结算。检修时，必须认真填写检修记、施工记录单、设备档案及报表。\n8）设备发生异常情况时，须报综合部处置。"
  设备事故管理: '1）设备事故管理必须执行“预防为主”的方针，制定有效的防范措施。

    2）对设备事故应进行全员管理，各使用部门发动职工参与管理。

    3）综合部专责对事故调查分析、制定和监督执行防范措施，提出事故处理意见。及时统计上报。综合部会同使用部门组织抢修。

    4）在设备事故管理中应贯彻执行奖惩办法，实行有奖有罚，重奖重罚，与使用部门及职工个人的经济利益挂钩。'
  设备管理的基础工作: "1）要建立健全设备档案、设备图纸及技术资料等，要保存完好，认真做好统计工作，及时准确上报各类报表。\n2）档案材料及各项记录的填写要认真准确、字迹整洁、清晰。\n\
    3）各使用部门建立健全使用与维护保养责任制，完善操作规程，做好设备保养记录、检修记录、运转记录、事故分析和处理记录等。 \n4）各使用部门保证设备的完好率，不许设备带病运转，不许违章指挥和违章操作，定期对有关人员进行岗位培训和技能考核。"
