metadata:
  name: 消防管理制度
  code: YX-QESMS-C-004
  version: A/0
  level: 3
  industry: environmental_technology
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 总则
    content: |
      第一条 消防工作贯彻"预防为主，防消结合"的方针，坚持专门机构与群众管理相结合的原则，实行防火安全责任制。
      
      第二条 消防工作实行谁主管谁负责，企业的日常消防工作由行政部负责。

  - title: 2. 消防义务
    content: |
      第三条 任何单位或个人都有保护消防设施，预防火灾，报告火警的义务，任何单位员工都有参加组织灭火工作的义务。

  - title: 3. 消防设施管理
    content: |
      第四条 行政部内防火设施如灭火器等要经常保持有效性和安全性，对行政部提出整改的意见和隐患，有关单位或部门要及时整改，使消防设施保持合理有效，安全可靠。

  - title: 4. 用火用电管理
    content: |
      第五条 各办公地点，禁止使用电炉或火炉取暖，并经常检查照明线路的安全性，发现隐患，应立即整改。

  - title: 5. 疏散通道管理
    content: |
      第六条 各单位要保障疏散通道，安全出口畅通，并设置符合国家规定的消防安全疏散指示标志和应急照明设施，保持防火门、消防安全疏散指示标志，应急照明等设施处于正常状态，严禁占用疏散通道。

  - title: 6. 消防检查
    content: |
      第七条 不得拒绝、阻碍消防监督检查人员进行防火安全检查，如果发生火警、火灾，有关人员应如实提供真实情况。
      
      第八条 不得谎报或隐瞒不报火灾隐患或火警，不得阻碍、影响、干扰事故处理工作。

  - title: 7. 奖惩规定
    content: |
      第九条 对于违反上述消防管理办法，给予100—1000元的经济处罚；属领导责任或监督、检查不力的，给予50—200元的经济处罚；属员工违反规定的，视其情节给予50—500元的经济处罚。
      
      第十条 对于严格执行消防法规，认真落实防火措施，积极履行职责等成绩显著的，在扑救火灾工作不怕苦、不怕累挽救公司财产和员工生命安全及财产做出较大贡献的，按《员工奖惩办法》相关规定予以表彰奖励。

  - title: 8. 相关文件
    content: |
      - 《文件控制程序》
      - 《记录控制程序》
      - 《应急准备和响应控制程序》

  - title: 9. 相关记录
    content: |
      - 《消防设施检查记录》
      - 《消防演练记录》

variables:
  - name: effective_date
    description: 制度生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "行政部"
