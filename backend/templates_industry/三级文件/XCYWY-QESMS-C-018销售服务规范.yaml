document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-018销售服务规范
  document_code: XCYWY-QESMS-C-018
  version: A/0
content:
  目的: 为使销售工作规范化、正规化，使公司往专业化发展，持续满足顾客需求，特制定本规定。
  适用范围: 本规定适用于公司市场部或与销售有关的全体人员。
  行为规范: "a公司倡导正大光明、诚实敬业的职业精神和道德，要求全体销售人员自觉遵守国家政策法规和公司规章制度。\n\tb员工的一切职务行为，必须以公司利益为重，不得伪造或涂改公司的任何文件；禁止做有损公司形象或名誉的行为。\n\
    \tc准时参加公司组织的会议、培训、相关展会，在展会期间热情接待每一位客户（不得以区域划分为理由怠慢客户）。\n\td出差或外派销售人员，应保持电话畅通，与公司销售内勤进行及时有效沟通，确保销售人员的人身安全。出差到达住宿酒店必须报平安，外派销售员至少每天一次电话或QQ沟通。\n\
    \te禁止泄露任何销售数据、客户资料，禁止制造虚假销售数据及相关票据，禁止为完成销售任务损害公司利益的行为。\n\tf公司禁止任何兼职行为；禁止向竞争对手投资；禁止与公司有业务往来的客户处投资。\n\
    \tg禁止销售人员（包括其亲属名义）收取回扣、佣金、差价包括但不仅限于的不道德、违法行为。\n\th销售人员应当遵守双方签订的《保密协议》相关内容。"
  购销制度: "a销售员应建立健全的客户档案资料，并保证所有资料真实有效。\n\tb销售或赠送货物，必须开据送货单、销货单。\n\tc公司采用“款到发货”的结款方式，首次成交的新客户可实行货到付款。特殊原因需经公司总经理批准后方可货到付款，\n\
    \td由客户确认签收的送货单、销货单，必须交财务登记，批注分类保管以便后期收款。无法取得任何客户认可对账单据的销售人员，在日后对账过程中出现差异所造成的直接经济损失由销售经手人全额承担。\n\
    \te销售人员应当及时回收货款，完成公司回款任务，对货款的安全回收负责。\n\tf货款由销售人员直接收取现金的，经办人必须24小时内交给财务部或汇至公司指定帐户。如未能按时交给财务部的，视为挪用公款，依法追究责任。\n\
    \tg销售员上交货款如发现假币，收款人承担全额责任。\n\th查询货款到账：销售人员查货款到账情况需要与财务部相关人员联系。\n\ti凡发生退、换货的，经手人必须填写退、换货申请单，经公司审批后由销售内勤备案登记。退、换货必须由经手人全程负责，非特殊原因不得转手他人跟进。\n\
    \tj涉及到与两个销售人员均相关的客户时，分配给最先备案的销售员。\n\tk客户实地考察：客户需要进行实地考察的，需提前与公司协调，由公司组织进行。\n\t\
    l涉及售后服务的，直接销售人员负责处理相关事宜，售后人员给予技术上的支持与解答。"
  销售合同签订: '1、按公司正规合同文本执行。

    2、符合公司价格体系，总经理授权销售相关人员直接签订；如有变动条款或不符合市场行情的情况，需由总经理直接签署，总经理也可授权副总经理级签订。

    3、已签订的《购销合同》，必须及时交给销售内勤存档管理。

    4、任何人未经许可不得将合同交于与销售流程无关的人员查看。

    5、印鉴盖章

    1)授权书格式按照《授权书范本》执行，若有改动，在签订之前发送给副总经理审核，总经理批准后方可加盖公司公章，授权书必须与合同同时装订保存。

    2)对于正常销售合同，相关销售人员签订后到销售内勤处审核，盖“销售专用章”。

    3)对于非正常（即有条款修改）的销售合同经副总经理审核后交总经理批准，到市场部盖“合同专用章”。'
