metadata:
  name: 废弃物管理制度
  code: YX-QESMS-C-001
  version: A/0
  level: 3
  industry: environmental_technology
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 目的
    content: |
      规范公司内各类废弃物品、垃圾及时有效处理，防止其污染环境，并对其进行合理回收利用，降低成本，特制定本制度。

  - title: 2. 适用范围
    content: |
      适用于本公司运行过程中一般废弃物和危险废弃物的控制和综合处理。

  - title: 3. 职责
    content: |
      3.1 行政部
          - 本制度主控部门
          - 负责废弃物的识别
          - 负责监督本公司废弃物的收集、分类、标识和处理
      
      3.2 各部门
          - 负责将本部门的废弃物分类交付处理

  - title: 4. 废弃物分类
    content: |
      4.1 危险废弃物
          是指按国家统一规定的方法辨识具有一定毒性、腐蚀性、易燃性、易爆性、化学反应性，或对环境造成污染的固态、半固态和液态废弃物。
          
          办公活动产生的危险废弃物：
          - 废旧电池
          - 废旧灯管
          - 硒鼓、墨盒
          
          经营活动产生的危险废弃物：
          - 废机油
          - 废化学试剂
          - 油抹布
      
      4.2 一般废弃物
          - 办公活动产生的一般废弃物：废旧纸张和报纸、办公垃圾
          - 经营活动产生的一般废弃物：一般工业垃圾、废旧包装物、废旧设备部件
      
      4.3 可回收废弃物
          是指在经营活动中产生的有再利用价值的废物，如纸箱、废桶、废编织袋、废塑料包装膜、废纸箱、产品下脚废料、废旧纸张等。

  - title: 5. 废弃物控制
    content: |
      5.1 减量化措施
          - 公司经营过程中应严格执行相关制度
          - 合理使用包装材料
          - 尽量减少废料、废弃物的产生
      
      5.2 分类存放
          - 废弃物要放置到指定的存放区域
          - 按照危险废弃物、一般废弃物、可回收废弃物分类存放
          - 设置明显的标识

  - title: 6. 废弃物处置
    content: |
      6.1 可回收废弃物处置
          - 各部门将可回收废弃物收集、标识、分类存放
          - 待有一定量时，按公司要求回收再利用或送回收站处理
          - 避免造成环境污染
          - 做好废弃物处理统计记录
      
      6.2 危险废弃物处置
          - 墨盒、硒鼓、废旧灯管、废油、废油抹布等统一回收
          - 集中交由有资质的公司处理
          - 保存转移联单等处置记录
      
      6.3 一般废弃物处置
          - 生活垃圾按指定地点集中存放
          - 交由物业或环卫将垃圾运往厂外垃圾场进行环保处理
          - 销售活动产生的一般废弃物统一进行处理
          - 废旧设备经确认审批后，定期进行报废或回收处理

  - title: 7. 相关文件
    content: |
      - 《文件控制程序》
      - 《记录控制程序》
      - 《环境、职业健康安全管理体系运行控制程序》

  - title: 8. 相关记录
    content: |
      - 《废弃物处理统计记录》
      - 《危险废弃物转移联单》

variables:
  - name: effective_date
    description: 制度生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "行政部"
