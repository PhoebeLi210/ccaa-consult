document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-009噪声排放管理规定
  document_code: XCYWY-QESMS-C-009
  version: A/0
content:
  范围: 适用于本公司所有噪声源及相关生产活动。为确保噪声排放符合法律法规和其他相关要求，对噪声源进行有效的控制，保护员工健康和减少对环境的影响。
  管理要求: "职责\n综合部负责对噪声源相关设备的维修管理。\n管理和控制\n噪声源\n本公司噪声源包括：\n1).夏季中央空调冷却塔运行产生低频噪声及水雾飘散\n\
    噪声的控制和监测\n1).夏季中央空调冷却塔运行产生低频噪声及水雾飘散：安装隔音屏障或降噪设备，减少低频噪声对外界的影响。优化冷却塔的设计与运行方式，减少水雾的飘散范围。定期对冷却塔进行维护，确保其运行状态良好，降低噪声与水雾排放\n\
    噪声排放标准\n本公司厂界噪声排放执行《工业企业厂界环境噪声排放标准》（GB12348-2008）中的3类标准。\n各部门要定期对噪声源及噪声的控制和管理情况以及员工个人防护情况进行监督检查，发现不符合现象的，及时向相关责任部门提交改进要求或改进建议，要求责任部门限期改进。\n\
    \    综合部要定期组织专业检测机构对本公司噪声排放情况按相关的法律法规及其他要求进行检测，发现不符合情况时，及时向最高管理者报告，以便及时得到处理。"
