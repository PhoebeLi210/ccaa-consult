document_info:
  document_type: 三级文件
  document_name: XCYWY-QESMS-C-012废气排放管理实施规则
  document_code: XCYWY-QESMS-C-012
  version: A/0
content:
  目的: 明确对本公司各种废气的管理，确保废气排放符合标准的要求，以减少对大气环境影响以及对人员的危害。
  范围: 适用于本公司经营活动及员工生活中所产生的废气的排放控制。
  管理要求: '职责

    3.1.1管理者代表负责对废气污染的监测管理。

    管理和控制

    废气的分类

    本公司所产生的废气包括：

    1).地下车库通风系统低效运行及车辆怠速造成CO、NOₓ积聚

    废气的排放管理

    1).地下车库通风系统低效运行及车辆怠速造成CO、NOₓ积聚：定期检查和维护通风系统，确保其正常高效运行；优化通风设计以提高空气流通效率。设置车辆怠速管理措施，如引导车辆在停车后关闭发动机或设置禁止怠速区域。安装CO和NOₓ浓度监测设备，实时监控空气中有害气体的含量并及时预警。

    废气的检测

    管理者代表要定期组织对废气排放场所进行监测，每年至少监视一次，若其他原因导致排放可能发生变化时，要及时增加监没或修改监没频率，当有不符合情况时，要及时向相关部门提交改进建议或改进要求，由责任部门限期改进，并要将监测结果及相关的改进情况提交管理评审。'
