  document_type: 三级文件
  document_name: XCYWY-QESMS-C-013消防管理制度
  document_code: XCYWY-QESMS-C-013
  version: A/0
content:
  目的: 贯彻“预防为主，防消结合”的方针，加强平时的消防教育，确保安全办公、避免火灾发生，防止造成环境影响和人员伤害、财产损失，降低风险。
  适用范围: 本制度适用于公司消防管理。
  职责: '1）公司管理者代表负责主管公司消防工作，建立三级防火网络，定期组织安全防火检查，组织消防训练；

    2）专职消防队负责发生火灾时扑救工作。

    3）各部门做好配合工作。'
  工作程序: "消防宣传教育能加强公司员工的防火意识，充分认识防火的重要性。处理火警的原则为：必须认为任何火警的信息都是真的，有关人员必须第一时间奔赴现场，进行察看或扑救。\n\
    建立“安全网络组织”\n4.1.1公司依照《中华人民共和国消防法》，制订防火责任制，由总经理任安全防火网络的领导，为公司（一级）防火责任人，负责主管公司消防工作，其它部门为二级防火责任人，负责各自部门的防火管理，小组为三级防火责任人，负责各自责任区域的防火工作。各部门选派1-2员工作为防火员。\n\
    4.1.2建立安全网络组织的应急组织名单：\n    总指挥：邵道鹏（总经理）\n    副总指挥：高良（管理者代表）\n    重点部位：办公区域、财务区域、仓库\n\
    \    专职消防队：各部门推选\n4.1.3应急联系电话：\n消防报警：119               医疗急救：120\n公安报警：110\n消防训练、消防宣传和消防培训\n\
    4.2.1公司综合部负责组织成员进行消防训练，对《火灾事故应急预案及演练》进行演习，每年一次。\n4.2.2综合部负责消防知识的宣传教育：\n    1)宣传教育的内容包括消防规章制度、防火的重要性、防火常识和应急措施等。\n\
    \    2)宣传教育可采取印发消防资料、图片，组织人员学习，请专人讲解，实地模拟消防演练等方式进行。\n4.2.3综合部负责消防知识培训，培训内容包括：\n\
    \    1)了解公司消防要害重点部位：配电房、仓库、办公区域、财务区域。\n    2)了解公司各种消防设施的情况，掌握灭火器的安全使用方法。\n   \
    \ 3)掌握火灾时扑救工作的知识和技能及自救知识和技能。\n    4)组织观看实地消防演练，进行现场模拟培训。\n消防设施的管理\n4.3.1公司消防设施包括灭火器、消防栓、消防水带、摄影头、消防应急灯、指示灯、消防通道、防火门等；公司负责建立健全设备管理台帐。\n\
    4.3.2综合部负责按实际需要配置充足的灭火器。\n4.3.3消防设施不得随意搬动、挪作他用，埋压、圈占应保持完好、齐全，并确保在有效期内。\n禁烟、动火管理\n\
    4.4.1在公司设立烟火管制区，各区内标记明显的“禁烟”、“禁带火种”等标志；\n4.4.2烟火管制区内严禁吸烟，凡需在烟火管制区动火必须经公司审批同意并采取有效的防范措施后方可动火。\n\
    易燃物料的防火管理\n4.5.1易燃物料的贮存应远离火源，单独贮存，并依据物料的性质采取密封贮存。\n4.5.2消除火源，严禁吸烟，严禁将打火机、火柴等带入易燃物料存放场所；\n\
    4.5.3综合部制订易燃物料贮存场所的消防应急计划，并组织演练。\n安全消防检查\n4.6.1消防安全检查类别\n4.6.1.1消防管理部门对灭火器进行每季度一次的检查；\n\
    4.6.1.2消防管理部门对消防器材（包括消防泵、消防栓、烟雾探测器、应急灯、报警器等）进行每半年一次试用；\n4.6.1.3独立检查组组织相关人员每年作一次全面检查。\n\
    4.6.2全面检查的内容变配电、电气系统、消防器材、人员培训、安全意识、劳动保护等。\n4.6.3每次检查完毕汇总火灾隐患和不安全因素，填写《职业健康安全纠正措施单》提出整改意见并定人员限期整改。\n\
    4.6.4有关部门要按时整改，不得拖延时间，综合部负责跟踪催办。\n4.6.5公司员工一旦发现有火警，能自己扑灭的，应立即采取措施，根据火警性质，就近使用消防栓或灭火器进行扑救。火势较大，自己不能扑救时，执行应急预案。\n\
    事故报告管理\n4.7.1发生各类火灾事故，要坚持“三不放过”的原则，即：找不出事故原因不放过，事故责任者、员工没受到教育不放过，没有防范措施不放过。\n\
    4.7.2各类事故需填写事故报告报公司，说明原因，提出整改措施。\n奖罚措施\n4.8.1对问题责任者要严惩不怠，给予100-500元罚款，情节严重的，给予开除之处分；\n\
    4.8.2对于挽救和防止事故有功的给予100-500元奖励。"
