  document_type: 三级文件
  document_name: XCYWY-QESMS-C-019售后服务管理制度
  document_code: XCYWY-QESMS-C-019
  version: A/0
content:
  售后服务管理细则: "为加强客户服务的管理，提高客户服务水平，特制定本制度。\n售后服务部门职能\na）搜集、接收和受理客户对公司产品的咨询与意见；\nb）处理各类客户投诉及市场投诉，第一时间反馈；\n\
    c）负责客户回访了解客户需求；\nd）向相关部门反馈客户意见及建议；\ne）受理办事处的产品维修。\n建立售后服务标准，规范售后服务\n售后服务是对企业信誉和品牌形象的持久维护，公司要向自主品牌方向发展，售后服务更要朝向专业化、统一化和规范化的方向发展，真正满足各区域消费者的服务需求。\n\
    及时快速的处理投诉\n所有投诉信息需及时反馈到公司的市场部，由市场部整理、过滤、检查、跟踪事件的进展，确保每个投诉案件都得到妥善解决，并认真分析总结造成客户投诉的原因，从根本上解决问题，预防同类投诉的再次发生。\n\
    开展客户满意度、忠诚度调查\n第一，顾客满意度调查可以提升产品和服务的质量，同时从顾客的意见和建议当中寻找解决顾客不满的针对性的方案。\n\t第二，顾客满意度市场调查可以让广大消费者认识到公司对客户的重视性，对提升公司形象和品牌知名度有很大帮助。\n\
    \t实践证明，客户的满意度和忠诚度是成正比的，而且客户好的评价还会带来对企业极为有利的市场效应。客户满意度调查结果将非常有利于公司产品经营策略的调整，也有利于更深层次的客户维护和客户挖掘。通过网络，电话等各种方法，及时、高效地发现及满足客户需求，从而最大程度上提高客户满意度及忠诚度，稳定现有客户，不断吸引新客户，挽回流失客户。"
  售后服务: '售后服务的内容

    a、现场指导安装或直接为用户安装、调试、维修。

    b、走访用户，征求意见，并及时处理用户投诉。

    c、做好质量信息的收集、整理、分析和利用。

    服务团队

    建立产品售后服务队伍，配备业务能力强，服务态度好的服务人员，健全产品售后服务网络。

    产品售后服务人员的职责

    a)指导用户安装，向用户介绍本公司产品使用和维护知识；

    b)收集用户反馈信息，及时答复用户咨询，处理用户投诉；

    c)履行质量职责。执行国家有关法律法规规定，确保用户满意。

    服务实施

    1）市场部应积极开展产品售后服务工作。认真听取用户意见，并将收集到的用户信息加以整理分析。

    2）对于用户来人、来函、来电和用户走访反映的产品质量、服务质量、包装质量、安装质量等问题，售后服务部门也要逐一记录并及时向有关部门反馈。如需到现场服务时应立即通知服务人员赴现场处理。

    3）技术服务人员、销售人员及其他人员在和用户接触中收集到的信息，要及时向有关部门反馈。

    4）服务人员去用户单位现场服务时应当认真履行职责，认真帮助用户解决质量问题，确保用户满意，并填写《调试报告》交售后服务部门存档备查。'
  客户投诉处理管理: "为迅速处理客户投诉，维护公司信誉，促进质量改善与客户的长期维护，制定本细则。\n投诉分类\n客户投诉依客户投诉原因的不同区分为：\n\t\
    1）质量异常导致的客户投诉；\n\t2）非质量异常导致的客户投诉(指人为因素造成)；\n\t3）其它原因导致的投诉。\n处理流程\n1）确认投诉问题\n\t\
    接到客户投诉或抱怨后，首先向客户了解具体投诉内容，做详细记录，建立客户投诉登记表，产品质量方面投诉应立即查明投诉产品详细信息、客户要求，进行详细登记，与相关部门进行核实，确认。\n\
    2）分析、核实问题\n\t根据不同分类，对投诉进行分析，若属我方质量问题应另拟定处理方式，会同相关部门共同分析造成投诉原因及责任归属部门；对人为因素和其他原因造成的投诉，配合其他相关部门按流程，与产品质量问题同等对待、处理。\n\
    \t如判定结果非我方原因造成，认真向客户解释，并出示我方鉴定结果及依据，协同客户分析可能的原因，并与客户商讨后续解决问题办法。\n3）协商处理办法\n\t\
    情节较轻的质量投诉，登记备案，及时反馈给相关部门并引起高度重视。情节严重的投诉，填写客户投诉处理表，由项目部提出产品解决措施，与市场部商议解决办法，并与客户协商最终解决办法，报各部门审批。\n\
    4）处理及落实处理方案\n\t及时向客户反馈投诉解决进程，依商议的解决办法进行后续处理，并全程跟踪落实情况，并拟定改善方法避免同类问题再次发生。\n处理职责\n\
    各部门对客户投诉案件的处理职责如下：\n1）市场部\n\t(1)客户投诉案件的登记，了解客户投诉及投诉理由的确认；\n\t(2)客户投诉内容的审核、调查、提报。\n\
    \t(3)与客户接洽客户投诉的调查及妥善处理。\n\t(4)客户投诉改善案的提出、洽办、执行成果的督促及效果确认\n\t(5)处理方式的拟定。\n\t(6)迅速传达处理结果。\n\
    \t(7)客户投诉处理中客户投诉反映的意见提报。\n2）市场部\n\t(1)客户投诉质量的检验确认；分析问题原因、拟定处理对策并监督执行。\n3）项目部\n\
    \t针对客户投诉内容详细调查，并拟定处理对策及执行检查。"
  售后服务工作原则: '4.1售后服务工作人员对客户投诉均应积极应对，礼貌接待。如因售后服务态度造成客户投诉，按绩效考核实施细则相关规定实施处罚。

    4.2接到投诉后，第一时间与客户取得联系，了解投诉问题，原因。

    4.3确认投诉后，在公司内严格执行流程，迅速处理，尽快解决，在第一时间答复客户。

    4.4监督投诉问题的落实。

    4.5遇有争议，按合同有关条款由专人负责协调。

    本制度发布日起实施，若与其它制度相冲突的地方以本制度为准执行。'
