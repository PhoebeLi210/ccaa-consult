metadata:
  name: 销售管理制度
  code: XY-QESMS-C-001
  version: A/0
  level: 3
  industry: software_sales
  effective_date: "{{effective_date}}"
  department: "{{responsible_department}}"

sections:
  - title: 1. 目的
    content: |
      为规范公司销售活动，提高销售服务质量，满足客户需求，增强客户满意度，特制定本制度。

  - title: 2. 适用范围
    content: |
      本制度适用于公司所有软件产品的销售活动，包括售前支持、销售过程、售后服务等全过程。

  - title: 3. 职责
    content: |
      3.1 销售部负责人
          - 负责销售管理制度的制定和监督执行
          - 审批销售合同和重要报价
          - 组织销售培训和考核
      
      3.2 销售人员
          - 负责客户开发和维护
          - 执行销售计划，完成销售目标
          - 收集客户需求，提供售前支持
          - 签订销售合同，跟踪合同执行
      
      3.3 技术支持人员
          - 提供产品技术咨询
          - 协助销售人员进行产品演示
          - 提供售后技术支持

  - title: 4. 售前支持
    content: |
      4.1 客户咨询
          - 及时响应客户咨询
          - 详细了解客户需求
          - 提供产品资料和解决方案
      
      4.2 产品演示
          - 根据客户需求安排产品演示
          - 准备演示环境和资料
          - 解答客户技术问题
      
      4.3 方案编制
          - 根据客户需求编制解决方案
          - 提供产品配置建议
          - 进行报价和商务谈判

  - title: 5. 销售过程管理
    content: |
      5.1 客户开发
          - 收集潜在客户信息
          - 进行客户拜访和沟通
          - 建立客户关系档案
      
      5.2 需求确认
          - 深入了解客户需求
          - 确认产品规格和数量
          - 明确交付时间和要求
      
      5.3 合同签订
          - 按照《合同管理制度》执行
          - 进行合同评审
          - 签订正式销售合同
      
      5.4 订单执行
          - 下达内部订单
          - 跟踪产品采购或交付
          - 协调物流配送
      
      5.5 收款管理
          - 按照合同约定收款
          - 及时开具发票
          - 跟踪应收账款

  - title: 6. 售后服务
    content: |
      6.1 产品交付
          - 协助客户进行产品安装
          - 提供产品使用培训
          - 交付产品文档和资料
      
      6.2 技术支持
          - 提供电话、网络技术支持
          - 解答客户使用问题
          - 提供远程协助服务
      
      6.3 客户回访
          - 定期进行客户回访
          - 了解产品使用情况
          - 收集客户意见和建议
      
      6.4 投诉处理
          - 及时受理客户投诉
          - 分析投诉原因
          - 制定整改措施
          - 反馈处理结果

  - title: 7. 客户满意度管理
    content: |
      7.1 满意度调查
          - 定期进行客户满意度调查
          - 采用问卷调查、电话访谈等方式
          - 收集客户评价和建议
      
      7.2 满意度分析
          - 统计满意度数据
          - 分析不满意原因
          - 识别改进机会
      
      7.3 改进措施
          - 制定改进计划
          - 实施改进措施
          - 跟踪改进效果

  - title: 8. 销售人员管理
    content: |
      8.1 任职要求
          - 具备相关产品知识
          - 具备良好的沟通能力
          - 具备销售技巧和经验
      
      8.2 培训要求
          - 新员工入职培训
          - 产品知识培训
          - 销售技能培训
      
      8.3 绩效考核
          - 设定销售目标和指标
          - 定期进行绩效评估
          - 实施激励和奖惩

  - title: 9. 相关文件
    content: |
      - 《合同管理制度》
      - 《客户满意度测量控制程序》
      - 《与客户有关的过程控制程序》

  - title: 10. 相关记录
    content: |
      - 《客户信息登记表》
      - 《客户需求记录表》
      - 《合同评审记录》
      - 《客户满意度调查表》
      - 《客户投诉处理记录》
      - 《销售服务过程确认记录》

variables:
  - name: effective_date
    description: 制度生效日期
    default: "{{company.establishment_date}}"
  
  - name: responsible_department
    description: 责任部门
    default: "销售部"
