document_info:
  document_type: 二级文件
  document_name: 管理体系监视和测量控制程序
  document_code: XCYWY-QESMS-B-019
  version: A/0
purpose: 为保证公司的质量、环境、职业健康安全管理体系正确有效地运行，对质量、环境、职业健康安全管理活动进行监视和测量，特制定本程序。
scope: ''
responsibilities: []
procedure_steps:
- 质量体系过程的监视和测量
- "4.1.1管理者代表通过内审和质量体系运行监控对以下内容实施过程控制：\n    a.与质量相关的组织结构和管理人员的配备；\n    b.客户满意程度调查分析报告；\n\
  \    c.产品和服务实施情况；\n    d.文件控制和工艺文件管理；\n    e.对公司产品和服务的日常抽查；\n    f.产品和服务质量和品质创优的实施情况；\n\
  \    g.客户提供的产品和服务。\n    h.订单或合同的交付进度管理；\n    i.产品和服务质量责任期的服务过程。\n4.1.3管理者代表对各责任部门的下列过程实施监视和测量：\n\
  \    a.人力资源配备；\n    b.软硬件配置及管理；\n    c.安全管理；\n    d.监视和测量设备的配备、使用和管理；\n    e.过程评审会签；\n\
  \    f.文件控制和工艺文件管理；\n    g.客户投诉或抱怨的处理。\n4.1.4过程监视和测量中发现不符合要求的，应责成责任部门及时予以纠正或采取纠正措施，并在实施后进行跟踪验证。"
- 环境、职业健康安全管理体系的监视和测量
- "环境、职业健康安全管理体系的绩效测量和监测分两类：主动和被动测量。\n４.2.1主动测量\n\t主动测量包括：体系运行的监控、有毒有害环境监测、安全装置监测、员工职业健康监测。\n\
  ４.2.1.1体系运行的监控\n\ta、体系运行的符合性；\n\tb、目标指标的完成情况；\n\tc、管理方案的执行情况；\n\td、适用法规要求的符合性。\n\
  ４.2.1.2有毒有害环境监测\n\t委托资质单位每两年做好噪声、粉尘、废水等有毒有害环境监测。当工艺发生变更或设备增加等可能导致噪声增强，粉尘增多，废水增排等特殊情况时，应适当增加检测的频次，确保持续达标排放。\n\
  ４.2.1.3安全装置监测\n\t安全装置的安全工作性能（可行时自我监测）：\n\t各种保护装置：漏电保护装置、机械保护装置、设备接地装置等。\n４.2.1.4员工职业健康监测\n\
  人员健康监测：\n\t（1）所有新聘人员在上岗前应持有健康状况证明，交综合部备案。（必要时）\n\t（2）职业病岗位人员应每年进行一次健康检查，提交健康状况证明，交综合部备案。\n\
  \t（3）所有从业人员离职前应进行一次健康检查，提交健康状况证明，交综合部备案。（必要时）\n４.2.2被动测量：被动测量是对环境职业健康安全管理体系已发生问题的统计、调查、分析和记录。被动测量包括：\n\
  \ta、环境污染事故、伤亡事故、职业病与事件、工伤、健康报告等；\n\tb、外部或相关方的投诉，财产损失事故或执法机构的批评与处罚等不良的绩效。\n４.2.3监测/监控检查计划的编制、审批和实施\n\
  ４.2.3.1市场部负责编制责任范围内的监测或监控检查计划，经主管领导审批后实施。监测或监控检查计划应包括以下内容：监测设备设施、监测人员、监测内容、频率和要求等。\n\
  ４.2.4监测/监控检查\n４.2.4.1检查方法主要有定期性、经常性、季节性、专业性、综合性等5大类检查。\n\t（1）定期检查：公司安全管理、防火、职业健康检查每月进行一次，依据消防检查宣城区管理系统要求。\n\
  \t（2）经常性检查：各部门根据情况和各项安全生产规章制度的执行情况，进行的日常检查。\n\t（3）季节性检查：根据季节变化特点，由各级部门进行如防寒、防滑、防冻、防中毒、防暑、降温、防汛、防台等季节性的检查。\n\
  \t（4）专业性检查：由专业部门组织进行的如防火、交通、建构筑物、电气、环境、卫生等检查。\n\t（5）综合性检查：由管理者代表组织有关人员对各部门进行的综合性安全、防火、交通、职业健康检查。\n\
  ４.2.4.2监测/监控检查的实施\n\t（1）监测/监控检查实施检查表方法。\n\t（2）用职业健康安全绩效监视和测量的设备应经过校准，执行《监视和测量设备控制程序》。\n\
  \t（3）检查结果应形成记录。"
