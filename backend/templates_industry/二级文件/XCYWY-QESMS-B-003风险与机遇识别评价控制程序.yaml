document_info:
  document_type: 二级文件
  document_name: 风险与机遇识别评价控制程序
  document_code: XCYWY-QESMS-B-003
  version: A/0
purpose: 当公司内外部环境及相关方需求发生变化时，及时识别风险和机遇，建立风险和机遇的应对措施，增强抗风险能力。
scope: ''
responsibilities:
- '3.1管理者代表负责组织收集风险管理初始信息。

  3.2各部门负责收集本部门业务范围内的风险管理初始信息，进行风险评估，必要时制定风险管理方案并组织实施。

  3.3各部门在存在重大风险和机遇的情况下，应及时提交相关风险和机遇识别情况，供公司管理层决策使用。'
procedure_steps:
- 内外环境因素
- "公司应确定外部和内部那些与组织的宗旨、目标、战略方向有关、影响质量环境职业健康安全管理体系实现预期结果的各种内外部方面的因素。   \n\t公司应对这些内外部因素的相关信息进行监视和评价，必要时，公司应更新这些信息。\
  \   \n\t在确定这些相关的内部和外部事宜时，公司应考虑以下方面： \n    a)可能对公司的目标造成影响的变更和趋势； \n    b)与相关方的关系，以及相关方的理念、价值观；\
  \ \n    c)组织管理、战略优先、内部政策和承诺；\n    d)资源的获得和优先供给、技术变更； \n    e)与气候、空气质量、水质量、土地使用、现存污染、自然资源的可获得性、生物多样性等相关的、可能影响组织目的或受组织环境因素影响的环境状况；\n\
  \    f) 与工作人员健康、伤害等有关的影响职业健康安全状况\n    g)受组织影响的或能够影响组织的环境状况。\n    注 1：外部的环境，可以考虑政治环境、经济环境、技术环境、竞争环境、文化环境、和自然环境方面，不管是国际、国家、地区或本地。\
  \  \n    注 2：内部环境，可以是组织的理念、价值观和文化和绩效等相关因素。组织的内部环境包括公司的使命，公司的资源，公司的文化，员工价值观等。"
- 风险和机遇的识别
- "4.2.1当内外部环境及相关方需求发生重大变化时，公司管理层（总经理，副总经理 ）应及时考虑内外部因素及相关方的要求，确定需要应对的风险和机遇，以便：\n \
  \   a)确保质量环境职业健康安全管理体系能够实现其预期结果；\n    b)增强有利影响；包括外部环境状况对组织的潜在影响\n    c)避免或减少不利影响；\n\
  \    d)实现改进。\n4.2.2公司管理层发现内外部环境及相关方需求发生重大变化时，组织相关部门识别根据内外部环境变化或相关方要求的变化所带来的风险和机遇。\n\
  包括：\n    a)在战略风险方面，公司应广泛收集国家、地方战略风险失控导致公司蒙受损失的案例，并至少收集与公司相关的以下重要信息：\n\t①国家、地方宏观经济政策以及经济运行情况、本行业状况、国家产业政策；\n\
  \t②科技进步、技术创新的有关内容；\n\t③市场（政府等）对公司产品和服务的需求；\n\t④与公司战略合作伙伴的关系，未来寻求战略合作伙伴的可能性；\n\t\
  ⑤公司主要客户、供应商及竞争对手的有关情况；\n\t⑥与主要竞争对手相比，公司实力与差距；\n\t⑦公司发展战略和规划、投融资计划、年度经营目标、经营战略，以及编制这些战略、规划、计划、目标的有关依据；\n\
  \    b)在财务风险方面，公司主要为政府服务，在款项收回、盈利等财务方面风险较小。\n    c)在市场风险方面，，公司主要为政府服务，在服务的价格及供需变化、竞争者等市场风险较小。\n\
  \    d)在运营风险方面，公司应至少收集与公司、本行业相关的以下信息：\n\t①标准要求更新，客户要求变化；\n\t②公司组织效能、管理现状、公司文化，高、中层管理人员和重要业务流程中专业人员的知识结构、专业经验；\n\
  \t③质量、安全、环保、信息安全等管理中曾发生或易发生失误的业务流程或环节；\n\t④因公司内、外部人员的道德风险致使公司遭受损失或业务控制系统失灵；\n\t\
  ⑤给公司造成损失的自然灾害以及除上述有关情形之外的其他纯粹风险；\n\t⑥对现有业务流程和信息系统操作运行情况的监管、运行评价及持续改进能力；\n\t⑦公司风险管理的现状和能力。\n\
  \    e)在法律风险方面，公司应广泛收集国内外公司忽视法律法规风险、缺乏应对措施导致公司蒙受损失的案例，并至少收集与公司相关的以下信息：\n\t①国家、地方与公司相关的政治、法律环境；\n\
  \t②影响公司的新法律法规和政策；\n\t③员工道德操守的遵从性；\n\t④公司签订的重大协议和有关合同；\n\t⑤公司发生重大法律纠纷案件的情况；\n\t⑥公司和竞争对手的知识产权情况。\n\
  4.2.3评价来自于已识别的危险源的OH&S风险，同时必须考虑现有控制的有效性；确定和评价与建立、实施、运行和保持OH&S管理体系相关的其他风险。\n4.2.4有关增强OH&S绩效的OH&S机遇，同时必须考虑所策划的对组织及其方针、过程或活动的变更，以及：\n\
  \    1)有关使工作、工作组织和工作环境适合于工作人员的机遇；\n    2)有关消除危险源和降低OH&S风险的机遇；\n    3)有关改进OH&S管理体系的其他机遇。\n\
  \    公司对收集的初始信息应进行必要的筛选、提炼、对比、分类、组合，以便进行风险评估。"
- 建立风险和机遇评估小组
- "当发现需要应对重大风险和机遇时，总经理应授权建立一个“风险和机遇评估小组” \n    a)组织实施风险和机遇分析和评估； \n    b)制定风险和机遇应对措施并落实执行；\
  \ \n    c)编制风险管理计划； \n    d)组织实施风险应对措施的实施效果验证。"
- 风险评估
- "a)风险评估小组应对收集的风险管理初始信息和公司各项业务管理及其重要业务流程进行风险评估。风险评估包括风险辨识、风险分析、风险评价三个步骤。\n    b)风险评估应由风险评估小组组织有关职能部门和工作人员参与，也可聘请有资质、信誉好、风险管理专业能力强的中介机构协助实施。\n\
  \    c)风险辨识是指查找公司各业务单元、各项重要经营活动及其重要业务流程中有无风险，有哪些风险。风险分析是对辨识出的风险及其特征进行明确的定义描述，分析和描述风险发生可能性的高低、风险发生的条件。风险评价是评估风险对公司实现目标的影响程度、风险的价值等。\n\
  \    d)进行风险辨识、分析、评价，应将定性与定量方法相结合。定性方法可采用问卷调查、集体讨论、专家咨询、情景分析、政策分析、行业标杆比较、管理层访谈、由专人主持的工作访谈和调查研究等。定量方法可采用统计推论（如集中趋势法）、计算机模拟（如蒙特卡罗分析法）、失效模式与影响分析、事件树分析等。\n\
  \    e)进行风险定量评估时，应统一制定各风险的度量单位和风险度量模型，并通过测试等方法，确保评估系统的假设前提、参数、数据来源和定量评估程序的合理性和准确性。要根据环境的变化，定期对假设前提和参数进行复核和修改，并将定量评估系统的估算结果与实际效果对比，据此对有关参数进行调整和改进。\n\
  \    f)风险分析应包括风险之间的关系分析，以便发现各风险之间的自然对冲、风险事件发生的正负相关性等组合效应，从风险策略上对风险进行统一集中管理。\n  \
  \  g)公司在评估多项风险时，应根据对风险发生可能性的高低和对目标的影响程度的评估，绘制风险坐标图，对各项风险进行比较，初步确定对各项风险的管理优先顺序和策略。"
- 风险管理策略
- "a)公司根据自身条件和外部环境，围绕公司发展战略，确定风险偏好、风险承受度、风险管理有效性标准，选择风险承担、风险规避、风险转移、风险转换、风险对冲、风险补偿、风险控制等适合的风险管理工具的总体策略，并确定风险管理所需人力和财力资源的配置原则。\n\
  \    b)一般情况下，对战略、财务、运营和法律风险，可采取风险承担、风险规避、风险转换、风险控制等方法。\n    c)公司应根据不同业务特点统一确定风险偏好和风险承受度，即公司愿意承担哪些风险，明确风险的最低限度和不能超过的最高限度，并据此确定风险的预警线及相应采取的对策。确定风险偏好和风险承受度，要正确认识和把握风险与收益的平衡，防止和纠正忽视风险，片面追求收益而不讲条件、范围，认为风险越大、收益越高的观念和做法；同时，也要防止单纯为规避风险而放弃发展机遇。\n\
  \    d)公司应根据风险与收益相平衡的原则以及各风险在风险坐标图上的位置，进一步确定风险管理的优选顺序，明确风险管理成本的资金预算和控制风险的组织体系、人力资源、应对措施等总体安排。\n\
  \    e)公司应定期总结和分析已制定的风险管理策略的有效性和合理性，结合实际不断修订和完善。其中，应重点检查依据风险偏好、风险承受度和风险控制预警线实施的结果是否有效，并提出定性或定量的有效性标准。"
- 风险管理方案
- "a)公司应根据风险管理策略，针对各类风险或每一项重大风险制定风险管理方案。方案一般应包括风险解决的具体目标，所需的组织领导，所涉及的管理及业务流程，所需的条件、手段等资源，风险事件发生前、中、后所采取的具体应对措施以及风险管理工具（如：关键风险指标管理、损失事件管理等）。\n\
  \    b)公司制定风险管理外包方案，应注重成本与收益的平衡、外包工作的质量、自身商业秘密的保护以及防止自身对风险解决外包产生依赖性风险等，并制定相应的预防和控制措施。\n\
  \    c)公司制定风险管理的内控方案，应满足合规的要求，坚持经营战略与风险策略一致、风险控制与运营效率及效果相平衡的原则，针对重大风险所涉及的各管理及业务流程，制定涵盖各个环节的全流程控制措施；对其他风险所涉及的业务流程，要把关键环节作为控制点，采取相应的控制措施。\n\
  \    d)公司应当按照各有关部门和业务单位的职责分工，认真组织实施风险管理方案，确保各项措施落实到位。必要时，应阶段性向分管领导提交风险评估报告。"
- 风险管理的监督与改进
- "a)公司应以重大风险、重大事件和重大决策、重要管理及业务流程为重点，对风险管理初始信息、风险评估、风险管理策略、关键控制活动及风险管理解决方案的实施情况进行监督，\
  \ 根据变化情况和存在的缺陷及时加以改进。\n    b)公司应建立贯穿于整个风险管理基本流程，连接各上下级、各部门和业务单位的风险管理信息沟通渠道，确保信息沟通的及时、准确、完整，为风险管理监督与改进奠定基础。\n\
  \    c)各有关部门位应定期对风险管理工作进行自查和检验，及时发现缺陷并改进，其检查、检验报告应及时报送管理者代表。"
records:
- 《风险和机遇评估分析表》
