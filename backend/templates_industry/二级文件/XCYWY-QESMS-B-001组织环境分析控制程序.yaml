document_info:
  document_type: 二级文件
  document_name: 组织环境分析控制程序
  document_code: XCYWY-QESMS-B-001
  version: A/0
purpose: 为满足质量管理体系(GB/T 19001—2016 idt ISO 9001:2015)&环境管理体系(GB/T 24001—2016 idt ISO
  14001:2015)&职业健康安全管理体系(GB/T 45001—2020 idt ISO 45001:2018)标准4.1的要求，确定与本公司目标和战略方向相关并影响实现质量管理体系预期结果的各种内部和外部因素，对其进行有效控制。
scope: 适用于对本公司经营环境内外部因素识别、评价。
responsibilities:
- 管理者代表为本程序的归口管理部门，负责组织本公司的内外部环境分析与评价。
procedure_steps:
- "4.1 环境因素分析、评价\n \tSWOT分析法是用来确定企业自身的竞争优势、竞争劣势、机会和威胁，从而将公司的战略与公司内部资源、外部环境有机地结合起来的一种科学的分析方法。\n\
  \ \tSWOT分析，即基于内外部竞争环境和竞争条件下的态势分析，就是将与研究对象密切相关的各种主要内部优势、劣势和外部的机会和威胁等，通过调查列举出来，并依照矩阵形式排列，然后用系统分析的思想，把各种因素相互匹配起来加以分析。\n\
  \t优势，是组织机构的内部因素，具体包括：有利的竞争态势；充足的财政来源；良好的企业形象；技术力量；规模经济；产品质量；市场份额；成本优势；广告攻势等。\n\t\
  劣势，也是组织机构的内部因素，具体包括：设备老化；管理混乱；缺少关键技术；研究开发落后；资金短缺；经营不善；产品积压；竞争力差等。\n\t机会，是组织机构的外部因素，具体包括：新产品；新市场；新需求；外国市场壁垒解除；竞争对手失误等。\n\
  \t威胁，也是组织机构的外部因素，具体包括：新的竞争对手；替代产品增多；市场紧缩；行业政策变化；经济衰退；客户偏好改变；突发事件等。\n\t4.2构造SWOT矩阵\n\
  \ \t将调查得出的各种因素根据轻重缓急或影响程度等排序方式，构造SWOT矩阵。在此过程中，将那些对公司发展有直接的、重要的、大量的、迫切的、久远的影响因素优先排列出来，而将那些间接的、次要的、少许的、不急的、短暂的影响因素排列在后面。\n\
  \t4.3制定行动计划\n\t在完成环境因素分析和SWOT矩阵的构造后，便可以制定出相应的行动计划。制定计划的基本思路是：发挥优势因素，克服弱点因素，利用机会因素，化解威胁因素；考虑过去，立足当前，着眼未来。运用系统分析的综合分析方法，将排列与考虑的各种环境因素相互匹配起来加以组合，得出一系列公司未来发展的可选择对策。"
records:
- 《组织内外部环境分析表》
