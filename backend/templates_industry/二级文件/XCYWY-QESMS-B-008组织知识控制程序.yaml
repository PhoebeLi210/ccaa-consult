responsibilities:
- 'a.最高管理层与综合部负责公司知识管理的协调工作。知识管理的总责任人为最高管理层。

  b.综合部负责公司所有制度文件和资料的管理。

  c.综合部负责公司无形资产的管理。（实物可放在综合部档案室保管）

  d.综合部负责所有制度文件和资料的发放和记录。

  e.所有制度文件和资料应在综合部归档。涉及专业性较强的资料在当年由该专业部门归档保存，年度应统一移交综合部保管。以后可根据文件借阅权限借阅或使用。

  f.所有合同文档由市场部负责管理

  g.所有研发与技术文档由项目部负责管理，项目部应定期将文档目录交综合部备案。'
