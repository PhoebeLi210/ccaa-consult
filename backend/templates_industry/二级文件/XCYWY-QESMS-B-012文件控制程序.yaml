document_info:
  document_type: 二级文件
  document_name: 文件控制程序
  document_code: XCYWY-QESMS-B-012
  version: A/0
purpose: 确保各相关场所及时得到并使用适用的、有效版本文件，保证文件和资料的适用性、系统性、协调性和完整性。
scope: 适用于质量、环境、职业健康安全管理体系所要求的所有文件的控制，包括适当的外来文件和资料，也适用于呈硬拷贝、电子媒体形式的文件。
responsibilities:
- '3.1 管理者代表负责审核管理手册，总经理负责批准发布管理手册。

  3.2 各部门负责各自职能范围文件的编制、使用和保管。

  3.3 综合部负责质量、环境、职业健康安全管理体系所要求文件、行政管理文件、外来文件（如有关的政策法规文件）的归口控制和管理。

  3.4 综合部负责管理公司选用的国家法规、标准规范、以及公司编制的技术、工艺文件。'
procedure_steps: []
records:
- "《受控文件清单》\n《文件发放回收记录》 \n《文件起草更改作废会签审批》\n《文件借阅登记表》\n《外来文件清单》"
