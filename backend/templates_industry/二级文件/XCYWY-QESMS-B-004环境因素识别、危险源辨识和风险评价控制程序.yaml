document_info:
  document_type: 二级文件
  document_name: 环境因素识别、危险源辨识和风险评价控制程序
  document_code: XCYWY-QESMS-B-004
  version: A/0
purpose: 通过建立和保持程序，全面识别公司在办公、后勤、服务实现等过程中能够控制的或可望施加影响的环境因素、危害因素，评价不可接受风险及重要环境因素，采取相应的控制措施，并根据公司相关情况的变化及有关法律、法规和其他要求的变化，及时更新危险源、环境因素，实现对安全事故和环境污染的预防和有效控制。
scope: 本程序适用于对在办公、后勤、服务实现等过程中涉及的所有活动、所有设施、所有人员的危险源辨识、环境因素的识别及重要环境因素和风险的评价、更新与控制。
responsibilities:
- '3.1管理者代表

  3.1.1负责公司危险源辩识、环境因素识别、风险评价和风险控制的策划。

  3.1.2负责根据公司内外部条件的变化，定期和及时评审危险源辩识和环境因素识别的结果，并及时更新。

  3.1.3其他各部门：负责本部门危险源辩识、环境因素识别、风险评价和风险控制的策划，根据条件的变化及时更新。

  3.1.4工作人员代表：参与环境因素、危险源的辨识评价，并参与确定公司重要环境因素及不可接受风险。'
procedure_steps: []
records:
- '《环境因素识别与评价表》

  《重要环境因素清单》

  《危险源辨识与风险评价表》

  《不可接受风险清单》'
