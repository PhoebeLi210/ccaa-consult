document_info:
  document_type: 二级文件
  document_name: 服务提供控制程序
  document_code: XCYWY-QESMS-B-017
  version: A/0
purpose: 对服务提供过程进行有效的控制，以确保提供的服务质量符合顾客的需求和期望。
scope: 适用于服务提供过程控制、服务确认、标识和可追溯性、服务防护等。
responsibilities:
- "3.1 项目部\n    负责实施具体的服务活动以及服务现场基础设施日常管理；负责责任范围内服务的标识和可追溯性的实施和管理；负责相关范围内的服务防护工作；各服务团队负责相关的自检工作；负责服务进度、服务质量目标等内部的过程监视工作；及时分析纠正相关服务过程中的质量问题，积极采取改进措施和纠正措施；负责下达各服务团队的工作计划；负责设施的维护和保养工作。\n\
  3.2 项目部\n    负责提供服务过程控制所需的标准、流程文件/作业指导书、采购信息文件等技术质量文件；负责人力资源的技术、技能的培训，对服务流程实施和工作环境的监督监视；负责按策划的安排，对服务实现过程进行测量和监视；负责责任范围内的服务标识和可追溯性的实施和管理。\n\
  3.3 市场部\n    负责将订单传递给项目部，并负责对客户服务过程的控制，安排具体的售前、售中、售后服务活动。根据市场行情和服务需求，编制当月的请购单、向合格供方下达报价单实施采购。"
procedure_steps: []
records:
- '《设备维护保养计划》

  《设备点检表》'
