document_info:
  document_type: 二级文件
  document_name: 改进措施控制程序
  document_code: XCYWY-QESMS-B-026
  version: A/0
purpose: 消除质量、环境、职业健康安全管理体系运行和经营过程中已发生的不合格（或不符合，下同）或潜在不合格的原因，防止不合格再发生或可能发生，并使改进措施与不合格的影响程度相适用。
scope: ''
responsibilities:
- '4.1管理者代表是改进措施的主要负责人，负责改进措施实施、跟踪检查与效果评价。

  4.2市场部

  4.2.1负责产品和服务交付后和客户服务中，所产生改进措施实施的监控。

  4.2.2负责控制的过程中产生的不合格（不符合）或潜在不合格（不符合）的改进措施制定和实施。'
procedure_steps:
- 纠正措施
- "5.1.1发生下列情况之一的不合格，应采取纠正措施：\n\ta.客户投诉；\n\tb.内审、外审中的不合格；\n\tc.严重不合格；\n\td.重复发生的不合格；\n\
  \te.影响较大的服务质量问题。\n5.1.2有纠正措施要求的情况：\n\ta.管理评审输出；\n\tb.服务质量分析的结果；\n\tc.客户要求；\n\td.上级要求；\n\
  \te.公司认为有必要的情况。\n5.1.3不合格原因的调查和分析\n\t（1）可以通过分析下列资料查找不合格的原因：\n\ta.评审、验证记录；\n\tb.不合格记录；\n\
  \tc.过程监视的观察结果；\n\td.审核观察结果；\n\te.客户信息反馈；\n\tf.管理评审结果。\n\t（2）产生不合格的原因可能包括以下几个方面：\n\
  \ta.服务方案审查时发现的问题；\n\tb.与客户及相关单位沟通时发现的问题；\n\tc.服务交付后发现的不合格；\n\td.进度计划安排不当；\n\te.其它原因。\n\
  5.1.4有关产品和服务质量的纠正措施的实施\n\t（1）收集不合格信息；\n\t（2）评审不合格和原因分析；\n\t（3）制定纠正措施；\n\t（4）纠正措施的实施和验证；\n\
  \t（5）公司管理者代表抽样验证重大纠正措施的实施结果。\n5.1.5体系审核中纠正措施的实施\n\t（1）内审或外审时发现的不合格项和客户投诉，由公司管理者代表下达《不符合报告》；\n\
  \t（2）管理者代表负责对纠正措施的实施情况进行跟踪检查；\n\t（3）对外部质量审核的不合格项整改，由管理者代表负责将纠正措施与实施效果的整改报告报送外部质量审核部门。5.1.1发生下列情况之一的不合格，应采取纠正措施：\n\
  \ta.客户投诉；\n\tb.内审、外审中的不合格；\n\tc.严重不合格；\n\td.重复发生的不合格；\n\te.影响较大的服务质量问题。\n5.1.2有纠正措施要求的情况：\n\
  \ta.管理评审输出；\n\tb.服务质量分析的结果；\n\tc.客户要求；\n\td.上级要求；\n\te.公司认为有必要的情况。\n5.1.3不合格原因的调查和分析\n\
  \t（1）可以通过分析下列资料查找不合格的原因：\n\ta.评审、验证记录；\n\tb.不合格记录；\n\tc.过程监视的观察结果；\n\td.审核观察结果；\n\
  \te.客户信息反馈；\n\tf.管理评审结果。\n\t（2）产生不合格的原因可能包括以下几个方面：\n\ta.服务方案审查时发现的问题；\n\tb.与客户及相关单位沟通时发现的问题；\n\
  \tc.服务交付后发现的不合格；\n\td.进度计划安排不当；\n\te.其它原因。\n5.1.4有关产品和服务质量的纠正措施的实施\n\t（1）收集不合格信息；\n\
  \t（2）评审不合格和原因分析；\n\t（3）制定纠正措施；\n\t（4）纠正措施的实施和验证；\n\t（5）公司管理者代表抽样验证重大纠正措施的实施结果。\n\
  5.1.5体系审核中纠正措施的实施\n\t（1）内审或外审时发现的不合格项和客户投诉，由公司管理者代表下达《不符合报告》；\n\t（2）管理者代表负责对纠正措施的实施情况进行跟踪检查；\n\
  \t（3）对外部质量审核的不合格项整改，由管理者代表负责将纠正措施与实施效果的整改报告报送外部质量审核部门。"
- 改进措施
- "5.2.1信息来源\n    恰当地使用以下方面的信息：\n    a.客户投诉；\n    b.服务质量评审信息；\n    c.质量、环境、职业健康安全管理体系审核报告；\n\
  \    d.质量事故信息；\n    e.质量、环境、职业健康安全管理体系运行的信息；\n    f.市场调研信息等。\n5.2.2改进措施的实施\n   \
  \ （1）管理层负责收集和整理以上信息，进行数据分析，发现、分析不合格的潜在原因，确定要求采取改进措施的对象，策划质量改进并下达文件。\n    （2）管理层根据改进的要求分解落实，编制改进措施\
  \ 并组织实施。\n    （3）改进措施的实施单位负责记录所采取措施的结果。\n    （4）管理层负责评价改进措施的适宜性和有效性。\n    所有改进措施实施前应进行风险评价，确保所采取的措施与问题、环境影响、风险因素的严重性相适应。\n\
  \    针对所采取的纠正措施或改进措施，必要时应对体系文件进行修改，确保文件持续的适宜性。"
records:
- 《不符合报告》
