purpose: 为了所有合同、订单形成过程中，准确理解顾客要求，并转化为对公司产品和服务的要求，保证各项要求都有明确规定，公司有效的资源能够满足合同要求，从而确保满足客户的要求和期望。
scope: 适用于与客户有关的过程，包括：与产品和服务有关的要求的确定；与产品和服务有关的要求的评审；客户沟通。
responsibilities:
- '1）市场部负责组织与产品和服务有关的要求的确定和评审，并负责与客户沟通。

  2）市场部负责实施与产品和服务有关要求的评审和更改。'
