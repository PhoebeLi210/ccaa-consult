    - - '沟通内容：

        会议由总经理主持，说明管理评审的有关事项。

        管理者代表汇报管理体系运行情况，公司方针、目标实施情况，内部审核的总结及分析，可能引起管理体系变化的企业内部和外部环境，风险和机遇应对措施有效性以及纠正措施的实施。

        各部门负责人报告本部门负责的事项，在部门报告后，与会者对该部门工作的有效性、充分性和适宜性及其提出的改进建议进行评价并作出改进决策。

        对管理体系实施和保持的整体效果进行评审:对风险和机遇应对措施有效性进行评审；对管理体系的适宜性、充分性和有效性进行评审；对方针、目标的适宜性进行评审；合规义务遵守情况进行评价；对组织结构、职责分配、资源配备是否适宜进行评审；对管理手册及其支持文件是否需要修改进行评审。

        总经理总结评审结果

        肯定了质量环境职业健康安全体系的适宜性、充分性和有效性。组织结构合理，符合质量环境职业健康安全体系及其过程的要求。

        体系文件适宜。

        方针、目标适宜。

        提出相应的改进、纠正和预防措施的要求。'
