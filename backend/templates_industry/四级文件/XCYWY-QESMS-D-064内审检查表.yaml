    - - 'Q:5.3


        E:5.3


        S:5.3'
      - 公司内各职位职责是否明确？权限分配、沟通和理解是否适宜？各职责间关系是否明确？各部门职责是否有重叠或真空？权限是否明确？理解是否清晰？
      - 公司已编制《岗位职责与任职要求》及各部门职责规定，明确了各级人员岗位任职要求和各部门职责；最高管理者清楚了解自身职责，并确保职业健康安全管理体系相关角色的职责和权限分配至各层次，通过内部会议和公告等形式予以沟通；相关职责与权限作为文件化信息予以保持，所有员工均能清晰理解；《各部门负责人及内审员任命书》明确了关键岗位任命；各部门均知晓环境管理体系绩效，包括环境绩效；公司内每一层次工作人员为其所控制部分承担职业健康安全管理体系方面职责；职业健康安全管理部门负责监督和落实，同时明确由指定人员向最高管理者报告职业健康安全管理体系绩效，确保信息及时准确传达；相关记录已妥善保存。
      - 符合
    - - E:6.1.2
      - 是否识辨和评价出部门的环境因素？
      - 公司依据《环境因素识别、危险源辨识和风险评价控制程序》，由管理层、项目部、综合部、市场部共同组织识别各区域及活动的环境因素，编制了《环境因素识别与评价表（办公区域）》《环境因素识别与评价表》，并运用ABCDE判定法识别出重要环境因素，形成《重要环境因素清单》。该识别覆盖公司全部区域及活动，编制人为周曼，符合环境管理体系要求。
      - 符合
