    - - 'Q:4.1


        E:4.1


        S:4.1'
      - 1. 公司是否识别并确定了影响其实现质量管理体系、环境管理体系和职业健康安全管理体系预期结果的内部和外部因素？2. 是否对这些内外部因素的相关信息进行监视、评审和更新？3.
        相关分析、评审记录及支撑文件是否充分、可追溯？
      - 公司已确定与其宗旨、目标和战略方向相关并影响其实现质量管理体系、环境管理体系和职业健康安全管理体系预期结果的各种内部和外部因素。内部因素包括公司结构、资源、过程、文化、员工能力、财务表现、规模及设施、技术优势与知识等；外部因素包括法律法规、市场、技术、社会、经济、自然、竞争环境、专利技术、市场占有率、主要合作伙伴及同行影响、物理边界、信息渠道等。公司通过《组织环境分析控制程序》实施系统识别，并由管理者代表高良组织开展内外部环境分析与评审，形成《组织内外部环境分析表》和《组织内外部环境相关信息的监视和评审》记录，确保因素信息持续监视、评价和更新。
      - 符合
    - - 'Q:4.2


        E:4.2


        S:4.2'
      - 公司是否识别了工作人员及其他相关方（包括供应商、承包商、客户、社区、政府机构等）的需求和期望？是否确定其中哪些是或可能成为法律法规和其他要求（即合规义务）？是否对相关方及其要求的信息进行监视和评审？是否具备相应知识以确保执行？
      - 公司已识别与质量管理体系、环境管理体系及职业健康安全管理体系相关的各类相关方，包括供应商、承包商、客户、社区、员工及政府机构；明确了其需求和期望，涵盖安全培训、工作条件改善、应急响应、产品合规性、环境保护等方面，并判定其中涉及法律法规和其他要求的内容，纳入各管理体系管理范围。相关工作依据《相关方需求和期望控制程序》执行，《相关方需求和期望识别表》已形成并受控。周曼负责编制相关识别信息，管理者代表负责对相关方需求及期望的监视与评审，结果符合预期要求。
      - 符合
