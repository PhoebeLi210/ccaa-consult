    - - '培训内容

        摘要'
      - 火灾应急演练培训内容主要包括：火灾危险源识别、报警程序（如拨打119及内部报警方式）、疏散逃生路线与集合点位置、灭火器及消防设施的正确使用方法、初期火灾扑救要点，以及在烟雾环境中低姿捂鼻、不乘坐电梯等基本逃生技能。同时强调保持冷静、听从指挥、协助弱势人员撤离等应急行为规范，确保员工掌握“会报警、会灭火、会逃生”的核心能力，提升整体应急处置和自救互救水平。
