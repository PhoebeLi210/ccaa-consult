    sample_data:
    - - "1.审核目的：\n检查质量环境职业健康安全管理体系运行状况及与标准的符合情况，对存在的不符合，制定相应的纠正和预防措施，提高管理体系运行的水平，内审的结果作为管理评审的输入，并为第三方认证审核做好准备。\n\
        2.审核准则： \nGB/T 19001—2016 idt ISO 9001:2015 & GB/T 24001—2016 idt ISO 14001:2015\
        \ & GB/T 45001—2020 idt ISO 45001:2018标准及本公司质量环境职业健康安全管理体系文件、顾客要求、合同、法律法规和其它要求等。\n\
        3.审核覆盖的范围：公司管理体系涉及到的产品、所有部门、场所和过程\n4.审核涉及的部门：管理层,项目部,综合部,市场部\n5.审核时间：2025-08-12~2025-08-13，共2天\n\
        6.审核组成员：审核组长：高良A组；审核组员：周曼B组\n7.审核要求：\n⑴ 首、末次会议：公司领导、管理者代表、体系小组、各部门负责人、员工代表、内审员参加。\n\
        ⑵ 审核活动：按审核日程安排，被审核方的负责人应在本部门亲自接受审核。"
