      | 2 | Q/XXX-D-002 | 文件回收登记表 | 3年 | 综合管理部 |
      | 3 | Q/XXX-D-003 | 文件修订申请单 | 3年 | 综合管理部 |
      | 4 | Q/XXX-D-004 | 文件台账 | 长期 | 各部门 |
      | 5 | Q/XXX-D-005 | 外来文件清单 | 长期 | 综合管理部 |
      | 6 | Q/XXX-D-006 | 文件销毁记录 | 3年 | 综合管理部 |
    required: true

