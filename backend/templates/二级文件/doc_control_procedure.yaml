# 文件控制程序模板
template_id: doc_control_procedure
name: 文件控制程序
document_level: 二级文件
standard: null  # 通用程序文件
description: 规定文件的编制、审批、发放、使用、修订、回收等控制要求
version: "1.0"
author: 系统生成
file_type: markdown

variables:
  company_name:
    description: 公司名称
    required: true
    data_type: string
    source: company_info
  
  doc_number:
    description: 文件编号
    required: true
    data_type: string
    source: generated
    default_value: Q/XXX-B-001
  
  version:
    description: 版本号
    required: true
    data_type: string
    source: generated
    default_value: "A/0"
  
  issue_date:
    description: 发布日期
    required: true
    data_type: date
    source: generated
  
  departments:
    description: 部门列表
    required: true
    data_type: list
    source: company_info

sections:
  - id: header
    title: 文件信息
    content: |
      # 文件控制程序
      
      | 项目 | 内容 |
      |------|------|
      | 文件编号 | {{doc_number}} |
      | 版本 | {{version}} |
      | 生效日期 | {{issue_date}} |
      | 页数 | 共X页 |
      
      ---
    required: true

  - id: purpose
    title: 目的
    content: |
      ## 1 目的
      
      为对与质量管理体系有关的文件进行控制，确保各相关场所使用文件为有效版本，特制定本程序。
    required: true

  - id: scope
    title: 范围
    content: |
      ## 2 范围
      
      本程序适用于公司质量管理体系文件的编制、审批、发放、使用、修订、回收和作废等控制活动。
      
      本程序控制的文件包括：
      
      a) 质量手册；
      
      b) 程序文件；
      
      c) 作业指导书、检验规范等；
      
      d) 记录表格；
      
      e) 外来文件（如标准、法律法规等）。
    required: true

  - id: responsibilities
    title: 职责
    content: |
      ## 3 职责
      
      ### 3.1 总经理
      
      a) 负责批准质量手册；
      
      b) 负责批准公司级管理文件。
      
      ### 3.2 管理者代表
      
      a) 负责审核质量手册；
      
      b) 负责批准程序文件。
      
      ### 3.3 综合管理部
      
      a) 负责文件的归口管理；
      
      b) 负责文件的编号、登记、发放、回收和作废处理；
      
      c) 负责外来文件的登记和管理；
      
      d) 负责编制文件控制程序。
      
      ### 3.4 各部门
      
      a) 负责本部门文件的编制、修订和保管；
      
      b) 负责本部门使用文件的管理。
    required: true

  - id: procedure
    title: 工作程序
    content: |
      ## 4 工作程序
      
      ### 4.1 文件的分类
      
      #### 4.1.1 按层次分类
      
      a) 一级文件：质量手册
      
      b) 二级文件：程序文件
      
      c) 三级文件：作业指导书、检验规范、管理制度等
      
      d) 四级文件：记录表格
      
      #### 4.1.2 按来源分类
      
      a) 内部文件：公司自行编制的文件
      
      b) 外部文件：来自公司外部的文件，如国家标准、行业标准、法律法规、顾客提供的文件等
      
      #### 4.1.3 按受控状态分类
      
      a) 受控文件：需要控制版本和发放范围的文件
      
      b) 非受控文件：不需要控制版本的文件
      
      ### 4.2 文件的编号
      
      #### 4.2.1 文件编号规则
      
      文件编号采用以下格式：
      
      **Q/XXX-XX-XXX**
      
      其中：
      
      - Q：企业标准代号
      
      - XXX：公司代号
      
      - XX：文件类别代号（A-手册、B-程序、C-作业指导书、D-记录表格）
      
      - XXX：文件顺序号
      
      #### 4.2.2 版本号
      
      版本号采用字母+数字的形式，如"A/0"表示第一版第一次修订。
      
      ### 4.3 文件的编制和审批
      
      #### 4.3.1 文件的编制
      
      a) 质量手册由综合管理部组织编制；
      
      b) 程序文件由相关部门编制；
      
      c) 作业指导书由使用部门编制；
      
      d) 记录表格由使用部门编制。
      
      #### 4.3.2 文件的审批
      
      a) 质量手册：编制→部门负责人审核→管理者代表审核→总经理批准
      
      b) 程序文件：编制→部门负责人审核→管理者代表批准
      
      c) 作业指导书：编制→部门负责人审核→主管领导批准
      
      d) 记录表格：编制→部门负责人批准
      
      ### 4.4 文件的发放
      
      #### 4.4.1 受控文件的发放
      
      a) 文件经批准后，由综合管理部统一登记、编号、盖章；
      
      b) 综合管理部编制《文件发放登记表》，明确发放范围和数量；
      
      c) 文件领用人应在《文件发放登记表》上签字确认；
      
      d) 受控文件应加盖"受控"印章，注明分发号。
      
      #### 4.4.2 非受控文件的发放
      
      a) 非受控文件经批准后可直接发放；
      
      b) 非受控文件应加盖"非受控"印章；
      
      c) 非受控文件不进行版本控制。
      
      ### 4.5 文件的使用和保管
      
      a) 文件使用者应妥善保管文件，保持文件清晰、完整；
      
      b) 文件使用者发现文件有破损、丢失时，应及时申请更换或补发；
      
      c) 未经授权，任何人不得擅自复印、外借文件；
      
      d) 文件保管人应建立《文件台账》，定期清点文件。
      
      ### 4.6 文件的评审和修订
      
      #### 4.6.1 文件的评审
      
      a) 每年至少对文件进行一次评审，确保文件的适宜性；
      
      b) 当出现以下情况时，应及时对文件进行评审：
      
         1) 法律法规发生变化；
         
         2) 标准发生变化；
         
         3) 组织机构发生变化；
         
         4) 产品/工艺发生变化；
         
         5) 内审、外审发现文件不适宜。
      
      #### 4.6.2 文件的修订
      
      a) 文件需要修订时，由提出部门填写《文件修订申请单》，说明修订原因和内容；
      
      b) 文件修订的审批权限与文件编制的审批权限相同；
      
      c) 文件修订后，应更新版本号；
      
      d) 文件修订后，应按4.4条的规定重新发放。
      
      ### 4.7 文件的回收和作废
      
      #### 4.7.1 文件的回收
      
      a) 文件修订或作废后，综合管理部应及时回收旧版文件；
      
      b) 回收的文件应在《文件回收登记表》上登记；
      
      c) 回收的文件应加盖"作废"印章。
      
      #### 4.7.2 文件的作废
      
      a) 作废文件由综合管理部统一销毁，并做好销毁记录；
      
      b) 因法律或积累知识目的需要保留的作废文件，应加盖"作废保留"印章，单独存放。
      
      ### 4.8 外来文件的控制
      
      a) 综合管理部负责收集与质量管理体系有关的外来文件；
      
      b) 外来文件应进行登记，建立《外来文件清单》；
      
      c) 综合管理部应定期跟踪外来文件的更新情况，确保使用最新有效版本；
      
      d) 外来文件的发放按4.4条的规定执行。
    required: true

  - id: related_documents
    title: 相关文件
    content: |
      ## 5 相关文件
      
      a) 《记录控制程序》
      
      b) 《档案管理制度》
    required: true

